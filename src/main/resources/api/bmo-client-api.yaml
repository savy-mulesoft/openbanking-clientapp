openapi: 3.0.3
info:
  title: BMO Open Banking Client API
  description: |
    BMO Open Banking Proof of Concept — client application API surface.

    This Mule 4 application serves as both a **data holder** and an **aggregator client**:
    1. Exposes **BMO account and transaction data in FDX-standard format** — the same
       schema contract used by external data holders (TD, RBC, etc.).
    2. **Proxies** consented FDX requests to external resource servers (e.g. TD Canada Trust)
       using OAuth 2.0 access tokens stored server-side.
    3. Manages the **OAuth 2.0 Authorization Code** flow with Auth0 as the identity provider.
    4. Provides cache and session management for multi-user demo scenarios.

    **FDX alignment:** Both BMO's own endpoints (`/api/accounts`, `/api/transactions`) and
    the TD proxy endpoints (`/api/td/accounts`, `/api/td/accounts/{id}/transactions`) return
    data conforming to the **FDX Core API v6** schema — `accountCategory`, `accountId`,
    `nickname`, `currentBalance`, `availableBalance`, `transactionId`, `postedTimestamp`,
    `debitCreditMemo`, `amount`, `payee`, etc. This ensures a uniform data contract
    regardless of the data holder.

    **Security model:**
    - `/api/td/*` endpoints relay a Bearer JWT (obtained via Auth0) to the external
      FDX resource server. The JWT audience is `urn:fdx:tdbank` and scopes follow
      FDX DataCluster conventions (`ACCOUNT_BASIC`, `TRANSACTIONS`).
    - BMO-internal endpoints (`/api/accounts`, `/api/transactions`) return mock data
      and do not require authentication in this PoC.
  version: 1.0.0
  contact:
    name: Open Banking PoC Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8081
    description: Local Mule runtime
  - url: https://bmo-ob-client.cloudhub.io
    description: CloudHub (placeholder)

tags:
  - name: BMO Accounts
    description: Mock BMO account data
  - name: BMO Transactions
    description: Mock BMO transaction data
  - name: TD Proxy
    description: Proxied FDX requests to the TD resource server (Bearer JWT required)
  - name: OAuth
    description: Auth0 OAuth 2.0 authorization code flow endpoints
  - name: Session
    description: Server-side OAuth session management
  - name: Cache Management
    description: Demo cache and multi-user token management

paths:
  /api/accounts:
    get:
      operationId: searchForBmoAccounts
      tags:
        - BMO Accounts
      summary: Search for BMO accounts (FDX-aligned)
      description: |
        Returns BMO chequing, savings, and credit card accounts using
        FDX-standard schema fields (accountCategory, accountId, nickname,
        currentBalance, availableBalance, etc.). The response structure
        mirrors the FDX Core `searchForAccounts` operation.
      responses:
        '200':
          description: FDX accounts response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FdxAccountsResponse'

  /api/transactions:
    get:
      operationId: searchForBmoTransactions
      tags:
        - BMO Transactions
      summary: Search for BMO transactions (FDX-aligned)
      description: |
        Returns BMO transactions using FDX-standard schema fields
        (transactionId, postedTimestamp, debitCreditMemo, amount, payee, etc.).
        The response structure mirrors the FDX Core `searchForAccountTransactions` operation.
      responses:
        '200':
          description: FDX transactions response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FdxTransactionsResponse'

  /api/balance:
    get:
      operationId: getBmoBalance
      tags:
        - BMO Accounts
      summary: Get aggregated balance with OAuth context
      description: |
        Returns total balance across BMO accounts. If a valid OAuth session exists,
        includes authenticated context metadata; otherwise returns a 401 fallback.
      responses:
        '200':
          description: Authenticated balance with OAuth metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '401':
          description: No valid OAuth tokens — fallback data returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceFallbackResponse'

  /api/td/accounts:
    get:
      operationId: searchForTdAccounts
      tags:
        - TD Proxy
      summary: Proxy — list TD accounts (FDX)
      description: |
        Retrieves the stored OAuth access token from the Object Store and forwards
        a `GET /fdx/v6/accounts` request to the TD resource server with
        `Authorization: Bearer <token>`. Requires `ACCOUNT_BASIC` scope.
      security:
        - oauthSession: []
      responses:
        '200':
          description: FDX accounts response from TD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FdxAccountsResponse'
        '401':
          description: No stored access token or token expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Token lacks ACCOUNT_BASIC scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: TD resource server unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/td/accounts/{accountId}/transactions:
    get:
      operationId: searchForTdAccountTransactions
      tags:
        - TD Proxy
      summary: Proxy — list TD account transactions (FDX)
      description: |
        Proxies to `GET /fdx/v6/accounts/{accountId}/transactions` on the TD
        resource server. Requires `TRANSACTIONS` scope in the stored JWT.
      security:
        - oauthSession: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: TD account identifier
      responses:
        '200':
          description: FDX transactions response from TD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FdxTransactionsResponse'
        '401':
          description: No stored access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Token lacks TRANSACTIONS scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: TD resource server unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/connect:
    get:
      operationId: initiateOAuthConnect
      tags:
        - OAuth
      summary: Start OAuth consent flow
      description: |
        Validates query parameters, stores a pending consent record in the Object Store,
        and redirects the browser to Auth0's `/authorize` endpoint with the appropriate
        audience, scope, and state parameters.
      parameters:
        - name: bank
          in: query
          required: true
          schema:
            type: string
          description: Bank identifier (e.g. TD, RBC, Scotia, CIBC)
        - name: access_types
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated FDX scope codes (e.g. ACCOUNT_BASIC,TRANSACTIONS)
      responses:
        '302':
          description: Redirect to Auth0 authorize endpoint
        '400':
          description: Invalid or missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /callback:
    get:
      operationId: handleOAuthCallback
      tags:
        - OAuth
      summary: OAuth callback (Auth0 redirect)
      description: |
        Receives the authorization code from Auth0, exchanges it for tokens,
        merges pending consent metadata, stores the session in the Object Store,
        and redirects back to the UI.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to UI with status

  /api/oauth/session:
    get:
      operationId: getOAuthSession
      tags:
        - Session
      summary: Retrieve current OAuth session
      description: |
        Returns the stored OAuth session from the Object Store including access token,
        bank name, brand, scopes, and expiry. Used by the UI to sync local state.
      responses:
        '200':
          description: Active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthSessionResponse'
        '200 ':
          description: No active session
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: no_session

  /api/oauth/disconnect:
    post:
      operationId: disconnectOAuth
      tags:
        - Session
      summary: Remove OAuth session
      description: Deletes the OAuth session from the Object Store.
      responses:
        '200':
          description: Session removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: disconnected

  /api/clear-cache:
    post:
      operationId: clearAllCaches
      tags:
        - Cache Management
      summary: Clear all caches and OAuth session
      responses:
        '200':
          description: Caches cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /api/store-token:
    post:
      operationId: storeUserToken
      tags:
        - Cache Management
      summary: Store per-user token and scopes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                accessToken:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Token stored
          content:
            application/json:
              schema:
                type: object

  /api/user-data:
    get:
      operationId: getUserData
      tags:
        - Cache Management
      summary: Get cached user data
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User data
          content:
            application/json:
              schema:
                type: object

  /api/connected-users:
    get:
      operationId: getConnectedUsers
      tags:
        - Cache Management
      summary: List connected users
      responses:
        '200':
          description: Connected users list
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    oauthSession:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OAuth 2.0 access token (JWT) stored server-side in the Object Store.
        Obtained via Auth0 authorization code flow. Audience: urn:fdx:tdbank.

  schemas:
    DepositAccount:
      type: object
      title: Deposit Account
      description: FDX-aligned account representation (shared by BMO and external data holders)
      properties:
        accountCategory:
          type: string
          enum: [DEPOSIT_ACCOUNT, LOC_ACCOUNT]
          description: FDX account category
        accountId:
          type: string
          description: Unique account identifier
        nickname:
          type: string
          description: Human-readable account label
        status:
          type: string
          enum: [OPEN, CLOSED, NEGATIVE_CURRENT_BALANCE]
          description: Account status
        currency:
          type: string
          description: ISO 4217 currency code
        balanceAsOf:
          type: string
          format: date-time
          description: Timestamp of last balance update
        currentBalance:
          type: number
          format: double
          description: Current ledger balance
        availableBalance:
          type: number
          format: double
          description: Available funds

    Transaction:
      type: object
      title: Transaction
      description: FDX-aligned transaction representation (shared by BMO and external data holders)
      properties:
        accountCategory:
          type: string
          description: FDX account category
        accountId:
          type: string
          description: Account the transaction belongs to
        transactionId:
          type: string
          description: Unique transaction identifier
        postedTimestamp:
          type: string
          format: date-time
          description: Date/time the transaction was posted
        description:
          type: string
          description: Human-readable transaction description
        debitCreditMemo:
          type: string
          enum: [DEBIT, CREDIT]
          description: Indicates whether the transaction is a debit or credit
        amount:
          type: number
          format: double
          description: Transaction amount (always positive; sign indicated by debitCreditMemo)
        payee:
          type: string
          nullable: true
          description: Payee or counterparty name

    PageMetadata:
      type: object
      title: Page Metadata
      description: FDX pagination metadata
      properties:
        total:
          type: integer
          format: int64
          nullable: true
        nextOffset:
          type: string
          nullable: true

    BalanceResponse:
      type: object
      title: Balance Response
      description: Aggregated balance with OAuth context
      properties:
        totalBalance:
          type: object
          properties:
            amount:
              type: number
            currency:
              type: string
            lastUpdated:
              type: string
              format: date-time
        accountBreakdown:
          type: array
          items:
            type: object
            properties:
              accountId:
                type: string
              accountType:
                type: string
              balance:
                type: number
        oauthStatus:
          type: object
          properties:
            authenticated:
              type: boolean
            sessionId:
              type: string
            tokenPresent:
              type: boolean
            dataSource:
              type: string

    BalanceFallbackResponse:
      type: object
      title: Balance Fallback
      description: Returned when no OAuth session exists
      properties:
        error:
          type: string
        message:
          type: string
        fallbackData:
          type: object

    FdxAccountsResponse:
      type: object
      title: FDX Accounts Response
      description: |
        FDX-aligned accounts response. Used by both BMO's own /api/accounts and
        the TD proxy /api/td/accounts — same schema contract regardless of data holder.
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/DepositAccount'
        page:
          $ref: '#/components/schemas/PageMetadata'

    FdxTransactionsResponse:
      type: object
      title: FDX Transactions Response
      description: |
        FDX-aligned transactions response. Used by both BMO's own /api/transactions
        and the TD proxy /api/td/accounts/{id}/transactions — same schema contract.
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        page:
          $ref: '#/components/schemas/PageMetadata'

    OAuthSessionResponse:
      type: object
      title: OAuth Session
      description: Active OAuth session data from the Object Store
      properties:
        access_token:
          type: string
        id_token:
          type: string
        token_type:
          type: string
        expires_at:
          type: string
        session_id:
          type: string
        bankName:
          type: string
        bankDisplayName:
          type: string
        bankBrand:
          type: string
        requested_scopes:
          type: string
        scopes_technical:
          type: array
          items:
            type: string
        scopes_human:
          type: array
          items:
            type: string
        access_token_format:
          type: string

    ErrorResponse:
      type: object
      title: Error
      description: Standard error envelope
      properties:
        code:
          type: string
        message:
          type: string
