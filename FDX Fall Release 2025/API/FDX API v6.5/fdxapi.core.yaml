              type: number
              description: Total balance of cash advances
              x-fdx-csdf-account-categories: [REG_Z]
            transferBalance:
              type: number
              description: Total of all balance transfer amounts
              x-fdx-csdf-account-categories: [REG_Z]
            ppilBalance:
              type: number
              description: Total balance of Post Purchase Installment Loans (PPIL)
              x-fdx-csdf-account-categories: [REG_Z]
            underArbitration:
              type: boolean
              description: If `true`, the account is currently under arbitration
              x-fdx-csdf-account-categories: [REG_Z]
            feeSchedule:
              type: string
              description: Describes the current fee schedule for the account
              example: 'Fees can range from 2.59% to 2.99%, plus 49 cents.'
              x-fdx-csdf-account-categories: [REG_Z]
            ppilApr:
              type: number
              description: Current annual percentage rate (APR) for Post Purchase Installment Loans (PPIL)
              x-fdx-csdf-account-categories: [REG_Z]
            balanceTransfersApr:
              type: number
              description: Current annual percentage rate (APR) for Balance Transfers.
