              x-fdx-csdf-account-categories: [REG_Z]
            targetRateSaleApr:
              type: number
              description: Current annual percentage rate (APR) for Target Rate Sales
              x-fdx-csdf-account-categories: [REG_Z]
            transactions:
              type: array
              description: >-
                Transactions on the line-of-credit account.
