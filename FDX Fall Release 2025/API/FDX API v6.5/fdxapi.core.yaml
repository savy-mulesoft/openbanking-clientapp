      title: Payment Network Type
      description: >-
        Suggested values for Payment Network Type.

          | Value | Description |
          |-----|-----|
          | CA_ACSS | Automated Clearing Settlement System includes paper checks, electronic payments and Canada's version of ACH |
          | CA_LVTS | Large-Value Transfer System |
          | SWIFT_WIRE | SWIFT system for wire transfers (Society for Worldwide Interbank Financial Telecommunication) |
          | US_ACH | Automated Clearing House |
          | US_CHECK | Paper check (or their electronic images) processing |
          | US_CHIPS | Clearing House Interbank Payments System |
          | US_FEDNOW | Federal Reserve Instant Payment System 'FedNow' |
          | US_FEDWIRE | Fedwire Funds Service |
          | US_RTP | US Real Time Payments System, supporting RTP and using field `supportsRequestForPayment` to indicate RFP support (or not) |
          | US_RTP_RFP | US Real Time Payments System, supporting both RTP and Request For Payments (RFP) |
