      description: A line of credit account
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: LOC_ACCOUNT
              description: The entity type of this account, in this case LOC_ACCOUNT
            bills:
              type: array
              description: Payments due on the line of credit account
              x-fdx-csdf-account-categories: [REG_Z]
              items:
                $ref: '#/components/schemas/Bill'
            scheduledPayments:
              type: array
              description: Array of payments scheduled
              x-fdx-csdf-account-categories: [REG_Z]
              items:
                $ref: '#/components/schemas/ScheduledPayment'
            chargedInterest:
              $ref: '#/components/schemas/InterestRate'
              description: The periodic interest rate on the line of credit
              x-fdx-csdf-account-categories: [REG_Z]
            balanceAsOf:
              $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
              description: As-of date for balances
              x-fdx-csdf-account-categories: [REG_Z]
