              x-fdx-csdf-account-categories: [ANY]
            currentBalance:
              type: number
              description: Balance of funds in account
              x-fdx-csdf-account-categories: [ANY]
            earnedInterest:
              $ref: '#/components/schemas/InterestRate'
              description: The periodic (usually monthly) interest rate earned on account cash balances
              x-fdx-csdf-account-categories: [REG_E]
            openingDayBalance:
              type: number
