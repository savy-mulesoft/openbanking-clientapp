      type: object
      x-fdx-csdf-account-categories: [REG_E]
      allOf:
        - $ref: '#/components/schemas/Transaction'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: DEPOSIT_ACCOUNT
              description: The entity type of the account of this transaction, in this case DEPOSIT_ACCOUNT
            transactionType:
              $ref: '#/components/schemas/DepositTransactionType'
              description: >-
                The type of the deposit transaction: ADJUSTMENT, ATMDEPOSIT, ATMWITHDRAWAL, BILLPAYMENT,
                CASHIERSCHECK, CHECK, DEPOSIT, DIRECTDEPOSIT, DIVIDEND, FEE, INTEREST, PERSONTOPERSON,
                POSCREDIT, POSDEBIT, PREAUTHORIZEDDEPOSIT, PREAUTHORIZEDWITHDRAWAL, TRANSFER, WITHDRAWAL.
                Canadian accounts will also use these for chequing account transactions to ensure interoperability
              x-fdx-csdf-account-categories: [REG_E]
            payee:
              allOf:
                - $ref: './fdxapi.components.yaml#/components/schemas/String255'
              deprecated: true
              description: Payee name.
                This is deprecated and will be removed in a future major release in place of `transactionPayee`
                which provides detailed information of a payee's name and place of business on the `Transaction` entity
            checkNumber:
              type: integer
              description: Check number, or cheque number on Canadian accounts
              x-fdx-csdf-account-categories: [REG_E]

    DigitalAssetSecurity:
