  /reward-programs/{rewardProgramId}/categories:
    parameters:
      - $ref: './fdxapi.components.yaml#/components/parameters/FapiInteractionIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiActorTypeHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataProviderIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataRecipientIdHeader'
    x-fdx-csdf-account-categories: [ANY]
    get:
      operationId: getRewardProgramCategories
      tags:
        - Reward Program Categories
      description: Get reward categories
      summary: Get reward categories
      x-fdx-csdf-account-categories: [ANY]
      parameters:
        - $ref: '#/components/parameters/RewardProgramIdPath'
        - $ref: './fdxapi.components.yaml#/components/parameters/OffsetQuery'
        - $ref: './fdxapi.components.yaml#/components/parameters/PageKeyQuery'
        - $ref: './fdxapi.components.yaml#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Data describing a reward program's categories
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RewardCategories'
              examples:
                Multiple Reward Categories:
                  summary: Example response with multiple reward categories
                  value:
                    categories:
                      - categoryName: Amusement Park
                        categoryId: 100
                        multiplier: 1
                        description: >-
                          The Amusement Park category, including zoos, circuses and aquariums, covers
                          establishments that operate parks or carnivals and offer mechanical rides
                          and games and/or live animal shows.
                      - categoryName: Dining/Restaurant
                        categoryId: 101
                        multiplier: 2
                        description: >-
                          Merchants in the Dining/Restaurant category range from fast food restaurants
                          to fine dining establishments. They fall into the Dining category if they
                          primarily prepare food and drinks for immediate consumption on the premises
                          or for take-out. Dining merchants include bars, cocktail lounges, nightclubs,
                          taverns and fast-food restaurants. Some merchants that sell food and drinks
                          are located within larger establishments that sell other goods and services
                          and may not be not included in this category. For example a department store
                          or hotel restaurant, theme park cafes or discount store food counter would
                          not be categorized under Dining.
                      - categoryName: Entertainment
                        categoryId: 102
                        multiplier: 2
                        description: >-
                          Entertainment includes purchases made at sports promoters, movie theaters,
                          theatrical promoters, amusement parks, tourist attractions, record stores
                          and video rentals.
                      - categoryName: Hotels
                        categoryId: 103
                        multiplier: 5
                        description: >-
                          Hotels include businesses that provide sleeping or meeting room accommodations.
                          Some goods and services that appear on a hotel bill are included. Often
                          restaurants in hotels are categorized as a hotel purchase.
        '404':
          description: Request is invalid
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: './fdxapi.components.yaml#/components/schemas/Error'
              examples:
                Reward program Id not found:
                  value:
                    code: '1101'
                    message: Reward program Id not found
                    debugMessage: Provider custom developer-level error details for troubleshooting
                Categories not found for the reward program:
                  value:
                    code: '1102'
                    message: Categories not found for the reward program
                    debugMessage: Provider custom developer-level error details for troubleshooting
        '500':
          $ref: './fdxapi.components.yaml#/components/responses/500'
        '501':
          $ref: './fdxapi.components.yaml#/components/responses/501'
        '503':
          $ref: './fdxapi.components.yaml#/components/responses/503'

components:

  securitySchemes:
    ############################################################
    #
    # Security Schemes
    #
    ############################################################

    OAuthFapi1Advanced:
      $ref: './fdxapi.components.yaml#/components/securitySchemes/OAuthFapi1Advanced'

  parameters:
    ############################################################
    #
    # Core request parameters
    #
    ############################################################

    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      description: >-
        Use the [Accept-Language HTTP request header](https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Accept-Language)
        to indicate one or more languages to request for the response content in comma-separated string array format.
        English (code `en`) is the default if header is not sent. Spanish is `es` and French is `fr`.
        Provider may support any languages they choose
      schema:
        type: string
      required: false
      examples:
        Only Spanish:
          value:
            'Accept-Language: es'
        Multiple languages accepted:
          value:
            'Accept-Language: en,es'

    AccountIdPath:
      name: accountId
      in: path
      description: Account Identifier
      required: true
      schema:
        type: string

    ImageIdPath:
      name: imageId
      in: path
      description: Image Identifier
      required: true
      schema:
        type: string

    PaymentNetworkIdPath:
      name: paymentNetworkId
      in: path
      description: Payment network identifier for a bankId and account identifier pair,
        possibly used across multiple payment network types
      required: true
      schema:
        $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
      example: 'pymt-netwk-428a31'

    RewardProgramIdPath:
      name: rewardProgramId
      in: path
      description: Reward Program Identifier
      required: true
      schema:
        type: string

    StatementIdPath:
      name: statementId
      in: path
      description: Statement Identifier
      required: true
      schema:
        type: string

  schemas:
    ############################################################
    #
    # Core data entities
    #
    ############################################################

    Account:
      title: Account entity
      description: An abstract account entity that concrete account entities extend
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: '#/components/schemas/AccountDescriptor'
        - type: object
          properties:
            lineOfBusiness:
              type: string
              description: >-
                The name of the line of business of this account, when type is OTHER
              x-fdx-csdf-account-categories: [ANY]
            lineOfBusinessType:
              $ref: '#/components/schemas/LineOfBusinessType'
              description: >-
                The enumerated line of business of this account, one of
                COMMERCIAL, CONSUMER, SMALL_BUSINESS, OTHER. For type OTHER,
                add your other line of business name in property `lineOfBusiness`
              x-fdx-csdf-account-categories: [ANY]
            routingTransitNumber:
              type: string
              description: >-
                The routing transit number (RTN) associated with the account number at the owning institution.
                FDX v6.3 adds separate bankInstitutionId and bankTransitId properties and deprecates the prior
                approach to use this field for concatenated Canadian institution IDs.
                Deprecated with FDX v6.4, instead return through the `getAccountPaymentNetworks` operation as `bankId`
                for U.S. institutions or `bankInstitutionId` and `bankTransitId` for Canadian institutions
              deprecated: true
            balanceType:
              $ref: '#/components/schemas/BalanceType'
              description: >-
                ASSET (positive transaction amount increases balance), LIABILITY
                (positive transaction amount decreases balance)
              x-fdx-csdf-account-categories: [ANY]
            contact:
              allOf:
                - $ref: '#/components/schemas/AccountContact'
              description: Contact information associated with this account.
                Deprecated in release V6.3.1 and will be removed in next major release.
                Provider should return contact in the getAccountContact operation
              deprecated: true
            interestRate:
              type: number
              description: Interest Rate of Account
                Deprecated with v6.4 in favor of specific named rates on Account subtypes
              deprecated: true
            interestRateType:
              allOf:
                - $ref: '#/components/schemas/InterestRateType'
              description: FIXED or VARIABLE
                Deprecated with v6.4 in favor of specific named rates on Account subtypes
              deprecated: true
            interestRateAsOf:
              allOf:
                - $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
              description: Date of account's interest rate
                Deprecated with v6.4 in favor of specific named rates on Account subtypes
              deprecated: true
            priorInterestRate:
              type: number
              description: Previous Interest Rate of Account
                Deprecated with v6.4 in favor of specific named rates on Account subtypes
              deprecated: true
            interestRateIndex:
              type: string
              description: >-
                Variable rate index name such as
                EONIA, EURIBOR, EURREPO, FEFUND, LIBOR, PRIME, SOFR, SONIA, etc.
                Deprecated with v6.4 in favor of specific named rates on Account subtypes
              deprecated: true
            earlyPenaltyFlag:
              type: boolean
              description: Flag that indicates if there is an early penalty for withdrawal/payoff
              x-fdx-csdf-account-categories: [REG_E]
            transferIn:
              type: boolean
              description: Account is eligible for incoming transfers from accounts at the same institution
              x-fdx-csdf-account-categories: [REG_E]
            transferOut:
              type: boolean
              description: Account is eligible for outgoing transfers to accounts at the same institution
              x-fdx-csdf-account-categories: [REG_E]
            billPayStatus:
              $ref: '#/components/schemas/AccountBillPayStatus'
              description: Defines account's ability to participate in bill payments
              x-fdx-csdf-account-categories: [REG_E]
            micrNumber:
              $ref: './fdxapi.components.yaml#/components/schemas/String64'
              description: >-
                Magnetic Ink Character Recognition (MICR) number for this account at the owning institution.
                Typically printed on the bottom of checks in two of three parts as
                  * Routing number: First on the left, the nine-character number identifies the financial institution;
                  * Account number: In the middle, an account number linked to the specific customer account;
                  * Check number: The four-character check number on the right (omitted here at the account level).
                This is sensitive data which should only be exchanged if encrypted
              x-fdx-csdf-account-categories: [REG_E]
            lastActivityDate:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Date that last transaction occurred on account
              x-fdx-csdf-account-categories: [ANY]
            rewardProgramId:
              $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
              description: Long-term persistent identity of rewards program associated with this account
              x-fdx-csdf-account-categories: [ANY]
            transactionsIncluded:
              type: boolean
              description: Default is false. The transactions field on each Account type
                was deprecated in release V6.3.1 and will be removed in next major release.
                Transactions are returned in the `searchForAccountTransactions` operation response
              deprecated: true
            bankInstitutionId:
              type: string
              pattern: ^[0-9]{3}$
              description: >-
                The Canadian 3-digit Institution (FID) associated with the account number, including leading zeros
            bankTransitId:
              type: string
              pattern: ^[0-9]{5}$
              description: >-
                The Canadian 5-digit Transit number associated with the account number, including leading zeros

    AccountContact:
      title: Account Contact entity
      description: Contact information for the account
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/Contacts'
        - type: object
          properties:
            holders:
              type: array
              description: Owners of the account
              x-fdx-csdf-account-categories: [ANY]
              items:
                $ref: '#/components/schemas/AccountHolder'

    AccountDescriptor:
      title: Account Descriptor entity
      description: This descriptor provides minimal information about the account for use in lightweight arrays
      type: object
      x-fdx-csdf-account-categories: [ANY]
      required:
        - accountCategory
      discriminator:
        propertyName: accountCategory
      properties:
        accountCategory:
          $ref: '#/components/schemas/AccountCategory'
          description: The entity type of this Account
          x-fdx-csdf-account-categories: [ANY]
        accountId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: >-
            Long-term persistent identity of the account, though not an account number.
            This identity must be unique to the owning institution
          x-fdx-csdf-account-categories: [ANY]
        parentAccountId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: >-
            Long-term persistent identity of the parent account. This is
            used to group accounts
          x-fdx-csdf-account-categories: [ANY]
        error:
          $ref: './fdxapi.components.yaml#/components/schemas/Error'
          description: Present if an error was encountered while retrieving this account
          x-fdx-csdf-account-categories: [ANY]
        accountType:
          $ref: './fdxapi.components.yaml#/components/schemas/AccountType'
          description: Account type
          x-fdx-csdf-account-categories: [ANY]
        domicile:
          $ref: './fdxapi.components.yaml#/components/schemas/Domicile'
          description: The country and region of the account's legal jurisdiction
          x-fdx-csdf-account-categories: [ANY]
        accountNumber:
          description: >-
            Full account number for the end user for this account at the owning institution.
            If not masked this is sensitive data which should only be exchanged if encrypted.
            Deprecated with FDX v6.4, instead return through the `getAccountPaymentNetworks` operation
            as either `identifier` of `TOKENIZED_ACCOUNT_NUMBER` or as encrypted payload with
            `identifier` of `ACCOUNT_NUMBER`
          type: string
          deprecated: true
        accountNumberDisplay:
          type: string
          description: >-
            Account display number for the end user's handle at the owning
            institution. This is to be displayed by the Interface Provider
          x-fdx-csdf-account-categories: [ANY]
        productId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Unique ID of the marketed product for this account
          x-fdx-csdf-technical: true
        productName:
          type: string
          description: Marketed product name for this account. Used in UIs to assist in account selection
          x-fdx-csdf-account-categories: [ANY]
        nickname:
          type: string
          description: Name given by the user. Used in UIs to assist in account selection
          x-fdx-csdf-account-categories: [ANY]
        status:
          $ref: '#/components/schemas/AccountStatus'
          description: >-
            Account status. Suggested values are: OPEN, CLOSED, PENDINGOPEN, PENDINGCLOSE,
            PAID, DELINQUENT, NEGATIVECURRENTBALANCE, RESTRICTED
          x-fdx-csdf-account-categories: [ANY]
        description:
          type: string
          description: Description of account
          x-fdx-csdf-account-categories: [ANY]
        accountOpenDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Account opening date
          x-fdx-csdf-account-categories: [ANY]
        accountCloseDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Account closing date
          x-fdx-csdf-account-categories: [ANY]
        currency:
          $ref: '#/components/schemas/Currency'
          description: Account currency
          x-fdx-csdf-account-categories: [ANY]
        dataClusters:
          type: array
          description: >-
            An array of supported data cluster scopes for this account.
            I.e. ACCOUNT_DETAILED, TRANSACTIONS, STATEMENTS, REWARDS, etc.
          x-fdx-csdf-technical: true
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/DataCluster'
        fiAttributes:
          type: array
          description: Array of Financial institution-specific attributes
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'

    AccountHolder:
      title: Account Holder entity
      description: >-
        Extends `Customer` and adds a `relationship` field to define the customer's
        relationship with an account
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/Customer'
        - type: object
          properties:
            relationship:
              $ref: './fdxapi.components.yaml#/components/schemas/AccountHolderRelationship'
              description: "Customer's relationship to the account"
              x-fdx-csdf-account-categories: [ANY]

    AccountPaymentNetwork:
      title: Account Payment Network
      description: This provides details required to execute a transaction against the account
        within the payment network. Replaces data elements formerly on `AccountDescriptor` and `Account`.
        If identifier is `ACCOUNT_NUMBER` or `IBAN` this is sensitive data which should only be
        exchanged if encrypted. For detailed information on implementing encryption see the FDX CSDF API
        Security Model document's "Part 2 FDX Message Encryption" in the Security folder of the latest
        FDX Release download.
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      properties:
        paymentNetworkId:
          type: string
          description: >-
            The unique identifier for a payment network pair of `bankId` and account `identifier`.
            Can be used across multiple payment network types if the `bankId` and account `identifier`
            pair are also valid across those payment network types. In that case lifecycle events
            and change requests for the `paymentNetworkId` may need to also specify the applicable
            payment network type(s)
          x-fdx-csdf-account-categories: [REG_E]
        bankId:
          type: string
          description: >-
            Bank identifier used by the payment network. Typically the 9-digit routing transit number (RTN)
            associated with the account number at a US institution. FDX v6.3 adds separate bankInstitutionId
            and bankTransitId properties and deprecates the prior approach to use this field for concatenated
            Canadian Institution IDs. Can also be BIC (SWIFT code) for international transfers or omitted
            entirely if not needed, such as for IBAN transfers or Canadian institutions.
          x-fdx-csdf-account-categories: [REG_E]
        bankIdType:
          $ref: '#/components/schemas/BankIdType'
          description: If not specified, bankId should be interpreted as ABA for US accounts
            and be omitted for Canadian accounts (which use bankInstitutionId and bankTransitId)
          x-fdx-csdf-account-categories: [REG_E]
        identifier:
          type: string
          description: >-
           The number used to identify the account within the payment network
          x-fdx-csdf-account-categories: [REG_E]
        identifierType:
          $ref: '#/components/schemas/PaymentNetworkIdentifierType'
          description: The type of account `identifier` e.g.
           `ACCOUNT_NUMBER`, `IBAN`, or `TOKENIZED_ACCOUNT_NUMBER`
          x-fdx-csdf-account-categories: [REG_E]
        status:
          $ref: '#/components/schemas/AccountPaymentNetworkStatus'
          description: Current status of the account `identifier` and `bankId` pair for this
            payment network, one of `ACTIVE`, `SUSPENDED` or `REVOKED`
          x-fdx-csdf-account-categories: [REG_E]
        type:
          $ref: '#/components/schemas/PaymentNetworkType'
          description: Type of Canadian or U.S. payment network
            on which the account can be used
          x-fdx-csdf-account-categories: [REG_E]
        transferIn:
          type: boolean
          description: Can transfer funds to the account using this information
          x-fdx-csdf-account-categories: [REG_E]
        transferOut:
          type: boolean
          description: Can transfer funds from the account over this payment network
          x-fdx-csdf-account-categories: [REG_E]
        supportsRequestForPayment:
          type: boolean
          description: Can receive Request for Payments
          x-fdx-csdf-account-categories: [REG_E]
        transferLimits:
          $ref: '#/components/schemas/TransferLimits'
          description: The amount limits for transfers over this payment network
          x-fdx-csdf-account-categories: [REG_E]
        bankInstitutionId:
          type: string
          pattern: ^[0-9]{3}$
          description: >-
            The Canadian 3-digit Institution (FID) associated with the account number, including leading zeros
        bankTransitId:
          type: string
          pattern: ^[0-9]{5}$
          description: >-
            The Canadian 5-digit Transit number associated with the account number, including leading zeros
      required:
        - bankId
        - identifier
        - identifierType
        - type
        # These five fields to also be made required with FDX major release v7.0
        # - bankIdType
        # - paymentNetworkId
        # - status
        # - transferIn
        # - transferOut

    AccountPaymentNetworks:
      title: Account Payment Networks
      description: An array of payment networks supported by the account.
        If array contains `ACCOUNT_NUMBER` identifiers which are not masked this is sensitive data
        which should only be exchanged if encrypted. For detailed information on implementing encryption
        see the FDX CSDF API Security Model document's "Part 2 FDX Message Encryption" in the Security folder
        of the latest FDX Release download
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      properties:
        page:
          $ref: './fdxapi.components.yaml#/components/schemas/PageMetadata'
          description: Offset IDs for navigating result sets.
            Pagination for `/accounts/{accountId}/payment-network` is deprecated in v6.5
          deprecated: true
        links:
          $ref: './fdxapi.components.yaml#/components/schemas/PageMetadataLinks'
          description: Resource URLs for navigating result sets.
            Pagination for `/accounts/{accountId}/payment-network` is deprecated in v6.5
          deprecated: true
        paymentNetworks:
          type: array
          description: Array of payment networks
          x-fdx-csdf-account-categories: [REG_E]
          items:
            $ref: '#/components/schemas/AccountPaymentNetwork'

    Accounts:
      title: Accounts entity
      description: An optionally paginated array of accounts
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/PaginatedArray'
        - type: object
          properties:
            accounts:
              type: array
              description: >-
                An array of accounts with entity types dependent on the
                account type (deposit, investment, loan, line of credit,
                annuity, insurance, commercial, or digital wallet)
              x-fdx-csdf-account-categories: [ANY]
              items:
                $ref: '#/components/schemas/AccountWithDetails'

    AccountWithDetails:
      title: Account With Details entity
      description: An instance of an account with full details
      type: object
      x-fdx-csdf-account-categories: [ANY]
      discriminator:
        propertyName: accountCategory
        mapping:
          ANNUITY_ACCOUNT: '#/components/schemas/AnnuityAccount'
          BNPL_ACCOUNT: '#/components/schemas/BuyNowPayLaterAccount'
          COMMERCIAL_ACCOUNT: '#/components/schemas/CommercialAccount'
          DEPOSIT_ACCOUNT: '#/components/schemas/DepositAccount'
          DIGITAL_WALLET: '#/components/schemas/DigitalWallet'
          INSURANCE_ACCOUNT: '#/components/schemas/InsuranceAccount'
          INVESTMENT_ACCOUNT: '#/components/schemas/InvestmentAccount'
          LOAN_ACCOUNT: '#/components/schemas/LoanAccount'
          LOC_ACCOUNT: '#/components/schemas/LineOfCreditAccount'
      oneOf:
        - $ref: '#/components/schemas/AnnuityAccount'
        - $ref: '#/components/schemas/BuyNowPayLaterAccount'
        - $ref: '#/components/schemas/CommercialAccount'
        - $ref: '#/components/schemas/DepositAccount'
        - $ref: '#/components/schemas/DigitalWallet'
        - $ref: '#/components/schemas/InsuranceAccount'
        - $ref: '#/components/schemas/InvestmentAccount'
        - $ref: '#/components/schemas/LineOfCreditAccount'
        - $ref: '#/components/schemas/LoanAccount'

    AnnuityAccount:
      title: Annuity Account entity
      description: An annuity account type
      type: object
      allOf:
        - $ref: '#/components/schemas/Account'
        - $ref: '#/components/schemas/AnnuityDetails'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: ANNUITY_ACCOUNT
              description: The entity type of this account, in this case ANNUITY_ACCOUNT

    AnnuityDetails:
      title: Annuity Details entity
      description: The details of an annuity reported on either AnnuityAccount or AnnuitySecurity
      type: object
      properties:
        earnedInterest:
          $ref: '#/components/schemas/InterestRate'
          description: The periodic (usually monthly) interest rate earned on the account
        payoutType:
          $ref: '#/components/schemas/PayoutType'
          description: Indicates type of payout such as immediate or deferred
        policyProductType:
          $ref: '#/components/schemas/PolicyProductType'
          description: The type of annuity product, e.g. Fixed or Variable
        payoutAmount:
          type: number
          description: Amount paid out, based on mode frequency
        payoutMode:
          $ref: '#/components/schemas/PayoutMode'
          description: Frequency of annuity payments
        payoutStartDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Date the payout starts
        payoutEndDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Date the payout ends
        numberModalPayouts:
          type: integer
          description: Total number of payouts
        surrenderValue:
          type: number
          description: Cash surrender value (net) available if contract is surrendered
        payoutChangePercentage:
          type: number
          description: Percentage of the accumulated value to be paid to the payee each year; used exclusive of payoutChangeAmount
        payoutChangeAmount:
          type: number
          description: Incremental modal amount (positive or negative) by which the payout amount will be changed; used exclusive of payoutPercentage
        periodCertainType:
          $ref: '#/components/schemas/PeriodCertainType'
          description: The number of modal periods comprising the duration of the certain period of an annuity payout

    AnnuitySecurity:
      title: Annuity Security entity
      description: An Annuity held on an investment account
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - $ref: '#/components/schemas/AnnuityDetails'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: ANNUITY_SECURITY
              description: The entity type of this security, in this case ANNUITY_SECURITY

    AssetTransferNetwork:
      title: Asset Transfer Network
      description: Information required to facilitate asset transfer from this account
      type: object
      properties:
        identifier:
          type: string
          description: >-
            The number used to identify the account within the asset transfer network.
            If identifierType is ACCOUNT_NUMBER, this is the account number;
            if identifierType is TOKENIZED_ACCOUNT_NUMBER, this is a tokenized account number
        identifierType:
          description: Type of identifier
          $ref: '#/components/schemas/PaymentNetworkIdentifierType'
        institutionName:
          description: The name of the institution holding the account
          type: string
        institutionId:
          description: >-
            Institution identifier used by the asset transfer network ie. the Depository Trust and
            Clearing Corporation code for the institution holding the account
          type: string
        type:
          description: Type of asset transfer
          $ref: '#/components/schemas/AssetTransferType'
        jointAccount:
          description: Whether this account has joint owners
          type: boolean

    AssetTransferNetworkList:
      title: Asset Transfer Network List
      description: An array of asset transfer network details for this account
      type: object
      properties:
        assetTransferNetworks:
          description: Array of asset transfer networks
          type: array
          items:
            $ref: '#/components/schemas/AssetTransferNetwork'

    BalanceTransferOrCashAdvance:
      title: Balance Transfer or Cash Advance
      description: A single balance transfer or cash advance category on the account
        and its associated annual percentage rate (APR) and fee
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      properties:
        type:
          $ref: '#/components/schemas/AdvanceType'
          description: The type of transfer or advance, `BALANCE_TRANSFER`, `CASH_ADVANCE`,
            `DIRECT_DEPOSIT_CASH_ADVANCE`, `CHECK_CASH_ADVANCE`, `OTC_CASH_ADVANCE`
          x-fdx-csdf-account-categories: [REG_Z]
        apr:
          type: number
          description: The annual percentage rate (APR) charged for this type of transfer or advance
          x-fdx-csdf-account-categories: [REG_Z]
        fee:
          type: number
          description: The minimum fee charged for this type of transfer or advance.
            The value is zero if not charged on this type
          default: 0
          x-fdx-csdf-account-categories: [REG_Z]
        feePercentage:
          type: number
          description: The fee charged as a percentage of the transfer or advance.
            If percentage result is smaller than `fee`, the `fee` amount is charged
          x-fdx-csdf-account-categories: [REG_Z]

    BaseDepositAccountTermsAndConditions:
      title: Base Deposit Account Terms and Conditions
      description: Base type for initial and current terms and conditions for deposit accounts
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      required:
        - accountCategory
      allOf:
        - $ref: '#/components/schemas/BaseTermsAndConditions'
        - type: object
          properties:
            accountCategory:
              $ref: '#/components/schemas/AccountCategoryDeposit'
              description: The specific Account types which have Deposit Terms and Conditions
              x-fdx-csdf-account-categories: [REG_E]
            initial:
              $ref: '#/components/schemas/DepositAccountTermsAndConditions'
              description: The initial Terms and Conditions for this deposit account
              x-fdx-csdf-account-categories: [REG_E]
            current:
              $ref: '#/components/schemas/DepositAccountTermsAndConditions'
              description: Any data elements which have been updated since original Terms and Conditions
              x-fdx-csdf-account-categories: [REG_E]

    BaseLineOfCreditAccountTermsAndConditions:
      title: Base Line of Credit Account Terms and Conditions
      description: Base type for initial and current terms and conditions for line of credit account
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      required:
        - accountCategory
      allOf:
        - $ref: '#/components/schemas/BaseTermsAndConditions'
        - type: object
          properties:
            accountCategory:
              $ref: '#/components/schemas/AccountCategoryLineOfCredit'
              description: The specific Account types which have Loan or LOC Terms and Conditions
              x-fdx-csdf-account-categories: [REG_Z]
            initial:
              $ref: '#/components/schemas/LineOfCreditAccountTermsAndConditions'
              description: The initial Terms and Conditions for this loan or LOC account
              x-fdx-csdf-account-categories: [REG_Z]
            current:
              $ref: '#/components/schemas/LineOfCreditAccountTermsAndConditions'
              description: Any data elements which have been updated since original Terms and Conditions
              x-fdx-csdf-account-categories: [REG_Z]

    BaseTermsAndConditions:
      title: Base Terms and Conditions
      description: Base type for initial and current terms and conditions for deposit and line of credit accounts
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        productId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Unique ID of the marketed product for which these are the Terms and Conditions
          x-fdx-csdf-account-categories: [ANY]
        uris:
          type: array
          description: Static public-facing URIs which return initial or latest account terms and conditions
            as PDF files or web content
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: '#/components/schemas/TermsAndConditionsUri'
        rewardsTermsAndConditions:
          $ref: '#/components/schemas/RewardsTermsAndConditions'
          description: The PDFs or JSON data elements for the terms and conditions
            for the account's reward program (and reward categories, if any)
          x-fdx-csdf-account-categories: [ANY]

    Bill:
      title: Bill entity
      description: A statement of a payment due on an account
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      properties:
        totalPaymentDue:
          type: number
          description: >-
            Total payment due or next payment due as it appears on the account statement.
            Monthly payment due for loans. May be the same amount as the `statementBalance`
          x-fdx-csdf-account-categories: [REG_Z]
        minimumPaymentDue:
          type: number
          description: The minimum amount which is due on the account statement
          x-fdx-csdf-account-categories: [REG_Z]
        dueDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: The date that the payment is due as indicated on the statement
          x-fdx-csdf-account-categories: [REG_Z]
        autoPayEnabled:
          type: boolean
          description: Whether the user's bill is paid automatically as indicated on the statement
          x-fdx-csdf-account-categories: [REG_Z]
        autoPayAmount:
          type: number
          description: The amount of money the user has set to autopay this bill as indicated on the statement
          x-fdx-csdf-account-categories: [REG_Z]
        autoPayDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: The date the autopayment is set to trigger for this bill as indicated on the statement
          x-fdx-csdf-account-categories: [REG_Z]
        pastDueAmount:
          type: number
          description: >-
            The amount that the user should have already paid as it appears on the statement.
            The value is negative if the user owes money
          x-fdx-csdf-account-categories: [REG_Z]
        lastPaymentAmount:
          type: number
          description: The amount of the most recent payment as indicated on the statement
          x-fdx-csdf-account-categories: [REG_Z]
        lastPaymentDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: The date of most recent payment as indicated on the statement
          x-fdx-csdf-account-categories: [REG_Z]
        statementBalance:
          type: number
          description: >-
            The amount of the last statement. The value is negative if the user owes money
          x-fdx-csdf-account-categories: [REG_Z]
        statementDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: The date the statement was issued
          x-fdx-csdf-account-categories: [REG_Z]

    BondSecurity:
      title: Bond Security entity
      description: A Bond held on an investment account
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: BOND_SECURITY
              description: The entity type of this security, in this case BOND_SECURITY
            faceValue:
              type: number
              description: Face value at the time of data retrieved

    BuyNowPayLaterAccount:
      title: Buy Now Pay Later Account entity
      description: >-
        A Buy Now, Pay Later account. Represents a type of credit account where purchases are
        paid back on independent schedules instead of a standard recurring interval or date,
        which are commonly used by loan or line of credit accounts.
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: BNPL_ACCOUNT
              description: The entity type of this account, in this case BNPL_ACCOUNT
            balanceAsOf:
              $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
              description: As-of date for balances
              x-fdx-csdf-account-categories: [REG_Z]
            creditLine:
              type: number
              description: Maximum amount the customer can spend using buy now pay later.
                This is the same as a "credit limit" on a Line of Credit account
              x-fdx-csdf-account-categories: [REG_Z]
            availableCredit:
              type: number
              description: How much the customer can currently spend on _new_ buy now pay later purchases
              x-fdx-csdf-account-categories: [REG_Z]
            principalBalance:
              type: number
              description: Amount the customer owes excluding fees and interest
              x-fdx-csdf-account-categories: [REG_Z]
            currentBalance:
              type: number
              description: Current balance of the buy now pay later account
              x-fdx-csdf-account-categories: [REG_Z]
            financeCharges:
              type: number
              description: Finance charges
              x-fdx-csdf-account-categories: [REG_Z]

    BuyNowPayLaterPurchaseDetails:
      title: Buy Now Pay Later Purchase details
      description: A Buy Now Pay Later purchase details
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      properties:
        paymentFrequency:
          $ref: '#/components/schemas/PaymentFrequency'
          description: DAILY, WEEKLY, BIWEEKLY, SEMIMONTHLY, MONTHLY, SEMIANNUALLY, ANNUALLY
          x-fdx-csdf-account-categories: [REG_Z]
        paymentFrequencyMultiplier:
          type: number
          description: If present multiplies the paymentFrequency eg. every 3 weeks, otherwise defaults to 1
          x-fdx-csdf-account-categories: [REG_Z]
        numberOfPayments:
          type: number
          description: The number of payments expected
          x-fdx-csdf-account-categories: [REG_Z]
        originalPrincipal:
          type: number
          description: The buy now pay later purchase price
          x-fdx-csdf-account-categories: [REG_Z]
        transactionPayee:
          $ref: '#/components/schemas/TransactionPayee'
          description: The payee for the buy now pay later item
          x-fdx-csdf-account-categories: [REG_Z]
        bills:
          type: array
          description: Payments due on the buy now pay later account
          x-fdx-csdf-account-categories: [REG_Z]
          items:
            $ref: '#/components/schemas/Bill'
        scheduledPayments:
          type: array
          description: Array of payments scheduled
          x-fdx-csdf-account-categories: [REG_Z]
          items:
            $ref: '#/components/schemas/ScheduledPayment'
        chargedInterest:
          $ref: '#/components/schemas/InterestRate'
          description: The periodic interest rate charged on the purchase
          x-fdx-csdf-account-categories: [REG_Z]
        purchaseApr:
          type: number
          description: The APR on the buy now pay later purchase, if the purchase is interest-bearing
          x-fdx-csdf-account-categories: [REG_Z]
        purchaseTimestamp:
          description: When the buy now pay later item was purchased
          $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
          x-fdx-csdf-account-categories: [REG_Z]

    BuyNowPayLaterTransaction:
      title: Buy Now Pay Later Transaction entity
      description: A buy now pay later transaction
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      allOf:
        - $ref: '#/components/schemas/Transaction'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: BNPL_ACCOUNT
              description: The entity type of this account, in this case BNPL_ACCOUNT
            bnplStatus:
              $ref: '#/components/schemas/AccountStatus'
              description: >-
                Buy Now, Pay Later item status. One of: `OPEN`, `CLOSED`, `PENDINGOPEN`,
                `PENDINGCLOSE`, `PAID`, `DELINQUENT`, `NEGATIVECURRENTBALANCE`, `RESTRICTED`
              x-fdx-csdf-account-categories: [REG_Z]
            fees:
              type: number
              description: Fees charged on the buy now pay later purchase
              x-fdx-csdf-account-categories: [REG_Z]
            nextPaymentAmount:
              type: number
              description: Amount of next payment
              x-fdx-csdf-account-categories: [REG_Z]
            nextPaymentDate:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Due date of next payment
              x-fdx-csdf-account-categories: [REG_Z]
            purchaseDetails:
              $ref: '#/components/schemas/BuyNowPayLaterPurchaseDetails'
              description: Buy now pay later details
              x-fdx-csdf-account-categories: [REG_Z]
            paymentDetails:
              $ref: './fdxapi.components.yaml#/components/schemas/PaymentDetails'
              description: Breakdown of payment details
              x-fdx-csdf-account-categories: [REG_Z]
            outstandingBalance:
              type: number
              description: The outstanding balance on the buy now pay later purchase
              x-fdx-csdf-account-categories: [REG_Z]
            transactionType:
              $ref: '#/components/schemas/BuyNowPayLaterTransactionType'
              description: The transaction type; one of
                `CHECK`, `PAYMENT`, `FEE`, `ADJUSTMENT`, `INTEREST`, `PURCHASE`
              x-fdx-csdf-account-categories: [REG_Z]

    CardArt:
      title: Card Art entity
      description: Art associated with the card
      type: object
      properties:
        label:
          type: string
          description: Display label for the specific image
        imageUri:
          type: string
          format: uri
          description: >-
            The [URI](https://datatracker.ietf.org/doc/html/rfc2397) link
            of a PNG, JPG or GIF image with proportions defined by
            [ISO 8710 ID-1](https://en.wikipedia.org/wiki/ISO/IEC_7810) with 340x210 ratio and
            width no greater than 512 pixels. The image at this URI must be accessible at all
            times, with no additional authentication headers. Typically this is an image resource
            located in the data provider's public web site or Content Delivery Network

    CertificateOfDepositSecurity:
      title: Certificate Of Deposit Security entity
      description: A Certificate of Deposit held on an investment account
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: CD_SECURITY
              description: The entity type of this security, in this case CD_SECURITY
            term:
              type: integer
              description: Term of CD in months
            maturityDate:
              description: Certificate of Deposit maturity date
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'

    CommercialAccount:
      title: Commercial Account entity
      description: Information for a commercial account type
      type: object
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: COMMERCIAL_ACCOUNT
              description: The entity type of this account, in this case COMMERCIAL_ACCOUNT
            earnedInterest:
              $ref: '#/components/schemas/InterestRate'
              description: The periodic (usually monthly) interest rate earned on account balances
            balanceAsOf:
              description: As-of date of balances
              $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
            openingLedgerBalance:
              type: number
              description: Opening ledger balance
            closingLedgerBalance:
              type: number
              description: Closing ledger balance
            currentLedgerBalance:
              type: number
              description: Current ledger balance
            openingAvailableBalance:
              type: number
              description: Opening available balance
            currentAvailableBalance:
              type: number
              description: Current available balance
            closingAvailableBalance:
              type: number
              description: Closing available balance
            nextDayAvailableBalance:
              type: number
              description: Next day's available balance
            twoDaysPlusAvailableBalance:
              type: number
              description: Two days out's available balance
            numberOfOutstandingCredits:
              type: integer
              description: Number of outstanding credit transactions
            outstandingCreditsAmount:
              type: number
              description: Total amount of outstanding credits
            numberOfOutstandingDebits:
              type: integer
              description: Number of outstanding debit transactions
            outstandingDebitsAmount:
              type: number
              description: Total amount of outstanding debits
            transactions:
              type: array
              description: Transactions on the commercial account.
                Deprecated in release V6.3.1 and will be removed in next major release.
                Transactions are returned in the `searchForAccountTransactions` operation response
              deprecated: true
              items:
                $ref: '#/components/schemas/CommercialTransaction'
            commercialBalances:
              type: array
              description: A list of specific treasury management defined balances
              items:
                $ref: '#/components/schemas/CommercialBalance'

    CommercialBalance:
      title: Commercial Balance entity
      description: A specific treasury management defined balance
      type: object
      properties:
        commercialCode:
          $ref: '#/components/schemas/CommercialCode'
          description: The code for a specific treasury management defined field
        amount:
          type: number
          description: The treasury management balance amount
        memo:
          type: string
          description: Memo field for the treasury management balance amount

    CommercialCode:
      title: Commercial Code entity
      description: >-
        The code for a specific treasury management defined field.

        The [X9 BTRS/BTR3 standard](https://x9.org/standards/btrs/) (formerly named BAI2)
        for corporate and treasury data elements is proposed to provide the basis of
        (or starting point for) representing summary, account, and transaction codes
        for the Corp/Treasury Entity, subject to any necessary modifications useful
        to the members of the FDX consortium and users of the API specification
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TreasuryManagementType'
          description: The source of Treasury Management account definition; one of BAI, BTRS, ISO, SWIFT
        code:
          type: string
          description: The code of the Treasury Management defined field

    CommercialTransaction:
      title: Commercial Transaction entity
      description: A transaction on a commercial account type
      type: object
      allOf:
        - $ref: '#/components/schemas/Transaction'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: COMMERCIAL_ACCOUNT
              description: The entity type of the account of this transaction, in this case COMMERCIAL_ACCOUNT
            immediateAvailableBalance:
              type: number
              description: Immediate available balance
            nextDayAvailableBalance:
              type: number
              description: Next day available balance
            twoDaysPlusAvailableBalance:
              type: number
              description: Two days plus available balance
            referenceBankId:
              type: string
              description: Reference bank id
            referenceBranchId:
              type: string
              description: Reference branch id
            referenceCustomerId:
              type: string
              description: Reference customer id
            commercialCode:
              $ref: '#/components/schemas/CommercialCode'
              description: The code for a specific treasury management defined field
            memo:
              type: string
              description: Memo field for the commercial transaction

    Contribution:
      title: Contribution entity
      description: Contribution information to an investment account
      type: object
      properties:
        securityId:
          type: string
          description: Unique identifier of security
        securityIdType:
          $ref: '#/components/schemas/SecurityIdType'
          description: CINS, CMC, CME, CUSIP, ISIN, ITSA, NASDAQ, SEDOL, SICC, VALOR, WKN
        employerMatchPercentage:
          type: number
          description: Employer contribution match percentage
        employerMatchAmount:
          type: number
          description: Employer contribution match amount
        employeePreTaxAmount:
          type: number
          description: Employee pre-tax contribution amount
        employeePreTaxPercentage:
          type: number
          description: Employee pre-tax contribution percentage
        employeeAfterTaxAmount:
          type: number
          description: Employee after tax contribution amount
        employeeAfterTaxPercentage:
          type: number
          description: Employee after tax contribution percentage
        employeeRothTaxAmount:
          type: number
          description: Employee Roth contribution amount
        employeeRothTaxPercentage:
          type: number
          description: Employee Roth contribution percentage
        employeeDeferPreTaxAmount:
          type: number
          description: Employee defer pre-tax contribution match amount
        employeeDeferPreTaxPercentage:
          type: number
          description: Employee defer pre-tax contribution match percentage
        employeeYearToDate:
          type: number
          description: Employee total year to date contribution
        employerYearToDate:
          type: number
          description: Employer total year to date contribution
        rolloverContributionPercentage:
          type: number
          description: Rollover contribution percentage
        rolloverContributionAmount:
          type: number
          description: Rollover contribution Amount
        catchUpContribution:
          type: boolean
          description: If true, indicates that this is a catch up contribution

    Currency:
