              type: number
              description: Available credit
              x-fdx-csdf-account-categories: [REG_Z]
            nextPaymentAmount:
              type: number
              description: The amount of the next payment.
                This may differ from `minimumPaymentAmount` if the customer pays more than their minimum or pays out of cycle.
                This property is deprecated in favor of `amount` in `ScheduledPayments` and will be removed with a future major release
              deprecated: true
            nextPaymentDate:
              allOf:
                - $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Due date of next payment.
                May differ from statementAmountDueDate if the customer pays out of cycle.
                Deprecated in favor of `date` in `ScheduledPayments`, will be removed with a future major release
              deprecated: true
            principalBalance:
              type: number
              description: Principal balance
              x-fdx-csdf-account-categories: [REG_Z]
            currentBalance:
              type: number
              description: Current balance of the line of credit
              x-fdx-csdf-account-categories: [REG_Z]
            minimumPaymentAmount:
              type: number
              description: Minimum payment amount from last statement balance,
                which is due at `statementAmountDueDate`.
                Deprecated in favor of `minimumPaymentDue` in `Bills`, will be removed with a future major release
              deprecated: true
            lastPaymentAmount:
              type: number
              description: Last payment amount.
                Deprecated in favor of `lastPaymentAmount` in `Bills`, will be removed with a future major release
              deprecated: true
            lastPaymentDate:
              allOf:
                - $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Last payment date.
                Deprecated in favor of `lastPaymentDate` in `Bills`, will be removed with a future major release
              deprecated: true
            pastDueAmount:
              type: number
              description: Past Due Amount as it appears on the account.
                The statement past due amount should be populated in the `Bills` object
              x-fdx-csdf-account-categories: [REG_Z]
            lastStmtBalance:
              type: number
              description: Final balance amount at end of last statement.
                Deprecated in favor of `statementBalance` in `Bills`, will be removed with a future major release
              deprecated: true
            lastStmtDate:
              allOf:
                - $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Last Statement Date.
                Deprecated in favor of `statementDate` in `Bills`, will be removed with a future major release
              deprecated: true
            statementAmountDueDate:
              allOf:
                - $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: The payment due date listed for the statement balance.
                Deprecated in favor of `dueDate` in `Bills`, will be removed with a future major release
              deprecated: true
            purchasesApr:
              type: number
              description: Annual Percentage Rate for purchases
              x-fdx-csdf-account-categories: [REG_Z]
            advancesApr:
              type: number
              description: Annual Percentage Rate for cash advances
              x-fdx-csdf-account-categories: [REG_Z]
            transfersApr:
              type: number
              description: Annual Percentage Rate for balance transfers. Deprecated.
                Instead use `balanceTransfersApr` also added in V6.4 and V5.4,
                will be removed in next major release
              deprecated: true
            cashAdvanceLimit:
              type: number
              description: Cash advance limit
              x-fdx-csdf-account-categories: [REG_Z]
            availableCash:
              type: number
              description: Available cash
              x-fdx-csdf-account-categories: [REG_Z]
            financeCharges:
              type: number
              description: Finance charges
              x-fdx-csdf-account-categories: [REG_Z]
            cardNetwork:
              type: string
              description: Card network, e.g. `VISA`, `MASTERCARD`, `AMERICAN_EXPRESS`, `DISCOVER`, `INTERLINK`, `STAR` etc.
              x-fdx-csdf-account-categories: [REG_Z]
            cardArt:
              $ref: '#/components/schemas/CardArt'
              description: Any art associated to the card related to the account
              x-fdx-csdf-account-categories: [REG_Z]
