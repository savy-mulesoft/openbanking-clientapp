      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        currencyRate:
          type: number
          description: Currency rate between original and converted currency
          x-fdx-csdf-account-categories: [ANY]
        currencyCode:
          $ref: './fdxapi.components.yaml#/components/schemas/Iso4217CurrencyCode'
          description: ISO 4217 currency code
          x-fdx-csdf-account-categories: [ANY]
        originalCurrencyCode:
          $ref: './fdxapi.components.yaml#/components/schemas/Iso4217CurrencyCode'
          description: Original ISO 4217 currency code
          x-fdx-csdf-account-categories: [ANY]

    DebtSecurity:
      title: Debt Security entity
      description: An investment in a debt security
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: DEBT_SECURITY
              description: The entity type of this security, in this case DEBT_SECURITY
            parValue:
              type: number
              description: Par value amount
            debtType:
              $ref: '#/components/schemas/DebtType'
              description: Debt type. One of COUPON, ZERO
            debtClass:
              $ref: '#/components/schemas/DebtClass'
              description: Classification of debt. One of TREASURY, MUNICIPAL, CORPORATE, OTHER
            couponRate:
              type: number
              description: Bond coupon rate for next closest call date
            couponDate:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Maturity date for next coupon
            couponMatureFrequency:
              $ref: '#/components/schemas/CouponMatureFrequency'
              description: When coupons mature. One of MONTHLY, QUARTERLY,  SEMIANNUAL, ANNUAL, OTHER
            callPrice:
              type: number
              description: Bond call price
            yieldToCall:
              type: number
              description: Yield to next call
            callDate:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Next call date
            callType:
              $ref: '#/components/schemas/CallType'
              description: Type of next call. One of CALL, PUT, PREFUND, MATURITY
            yieldToMaturity:
              type: number
              description: Yield to maturity
            bondMaturityDate:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Bond maturity date

    DepositAccount:
      title: Deposit Account entity
      description: Information for a deposit account type
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: DEPOSIT_ACCOUNT
              description: The entity type of this account, in this case DEPOSIT_ACCOUNT
            balanceAsOf:
              description: As-of date of balances
              $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
              x-fdx-csdf-account-categories: [REG_E]
            earnedInterest:
              $ref: '#/components/schemas/InterestRate'
              description: The periodic (usually monthly) interest rate earned on account balances
              x-fdx-csdf-account-categories: [REG_E]
            currentBalance:
              type: number
              description: Balance of funds in account
              x-fdx-csdf-account-categories: [REG_E]
            openingDayBalance:
              type: number
              description: Day's opening fund balance
              x-fdx-csdf-account-categories: [REG_E]
            availableBalance:
              type: number
              description: Balance of funds available for use
              x-fdx-csdf-account-categories: [REG_E]
            annualPercentageYield:
              type: number
              description: Annual Percentage Yield
              x-fdx-csdf-account-categories: [REG_E]
            interestYtd:
              type: number
              description: YTD Interest
              x-fdx-csdf-account-categories: [REG_E]
            term:
              type: integer
              description: Term of CD in months
              x-fdx-csdf-account-categories: [REG_E]
            maturityDate:
              description: Maturity date for CDs
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              x-fdx-csdf-account-categories: [REG_E]
            underArbitration:
              type: boolean
              description: If `true`, the account is currently under arbitration
              x-fdx-csdf-account-categories: [REG_E]
            overdraftOptIn:
              type: boolean
              description: Whether customer has opted-in to coverage for FI to allow
                transactions which overdraw their account balance due to a debit card
                payment or ATM withdrawal
              x-fdx-csdf-account-categories: [REG_E]
            overdrafted:
              type: boolean
              description: Whether account currently has a negative or overdrafted account balance
              x-fdx-csdf-account-categories: [REG_E]
            overdraftProtectionFunded:
              type: boolean
              description: Whether customer has arranged alternate funding source(s)
                for FI to authorize and pay transactions on their account which might
                otherwise be declined or cause an overdraft on the account
              x-fdx-csdf-account-categories: [REG_E]
            overdraftFundingSources:
              type: array
              description: List of the customer's alternate funding sources from which
                FI can transfer funds to cover transactions if customer has overdraft
                protection from a consented account. In the order of which accounts
                will be attempted to transfer the coverage amount needed. Contains
                masked or truncated account number or nickname, account type and/or
                institution name for full clarity on an internal or external funding source
              x-fdx-csdf-account-categories: [REG_E]
              items:
                $ref: '#/components/schemas/FundingSource'
            transactions:
              type: array
              description: Transactions on the deposit account.
                Deprecated in release V6.3.1 and will be removed in next major release.
                Transactions are returned in the `searchForAccountTransactions` operation response.
              deprecated: true
              items:
                $ref: '#/components/schemas/DepositTransaction'

    DepositAccountTermsAndConditions:
      title: Deposit Account Terms and Conditions entity
      description: The static terms and conditions data elements for a deposit account
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      allOf:
        - $ref: '#/components/schemas/TermsAndConditionsCommon'
        - type: object
          properties:
            monthlyAccountFee:
              type: number
              description: Fee for monthly account maintenance. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            accountClosureFee:
              type: number
              description: Fee for account closure. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            accountInactivityFee:
              type: number
              description: Fee for account inactivity. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            incomingTransferFee:
              type: number
              description: Fee for an incoming electronic funds transfer. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            incomingWireFee:
              type: number
              description: Fee for an incoming wire transfer. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            nonsufficientFundsFee:
              type: number
              description: Fee for Non-Sufficient Funds (NSF), if a check or ACH transaction presented
                on account is returned unpaid. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            maximumMonthlyWithdrawals:
              type: integer
              description: Monthly cap on number of withdrawals which can made from account before incurring a fee
              x-fdx-csdf-account-categories: [REG_E]
            excessWithdrawalsFee:
              type: number
              description: Fee when monthly withdrawals exceed the maximum.
                The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            overdraftFee:
              type: number
              description: Fee for an overdraft if item is paid. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            overdraftFeeWaiverBalance:
              type: number
              description: De minimis waiver no. 1 for overdraft fee. Absolute dollar amount of the negative balance
                above which (i.e. for smaller negative balances) the overdraft fee is waived
              x-fdx-csdf-account-categories: [REG_E]
            overdraftFeeWaiverDebit:
              type: number
              description: De minimis waiver no. 2 for overdraft fee. Dollar amount of a debit transaction
                below which (i.e. for smaller transactions) the overdraft fee is waived
              x-fdx-csdf-account-categories: [REG_E]
            dailyOverdraftFeesCap:
              type: integer
              description: Daily cap on number of overdraft or NSF fees which can be charged to account
              x-fdx-csdf-account-categories: [REG_E]
            overdraftProtectionFee:
              type: number
              description: Fee for overdraft protection, an automatic sweep from a separate account to cover a transaction
                that would otherwise result in an overdraft. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            overdraftOptInProvision:
              type: boolean
              description: Whether account permits consumer to opt-in to overdraft coverage on debit card
                or ATM card transactions
              x-fdx-csdf-account-categories: [REG_E]
            overdraftAllowed:
              type: boolean
              description: Whether account permits consumer to have overdrafts at all
              x-fdx-csdf-account-categories: [REG_E]
            moneyOrderFee:
              type: number
              description: Fee for a money order. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            cashiersCheckFee:
              type: number
              description: Fee for a cashier's check. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            domesticOutgoingWireFee:
              type: number
              description: Fee for an outgoing wire transfer (domestic). The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            internationalOutgoingWireFee:
              type: number
              description: Fee for an outgoing wire transfer (international). The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            returnedPaymentFee:
              type: number
              description: Fee for a returned payment. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            fixedFinanceChargeFee:
              type: number
              description: Fee for a fixed finance charge. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            checkRedepositFee:
              type: number
              description: Fee for return or re-deposit of a check. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            stopPaymentFee:
              type: number
              description: Fee for a stop payment. The value is zero if not charged on this account
              default: 0
              x-fdx-csdf-account-categories: [REG_E]
            monthlyFeeWaiverDirectDeposit:
              type: number
              description: Amount of payroll direct deposit into account for which monthly maintenance fee is waived
              x-fdx-csdf-account-categories: [REG_E]
            monthlyFeeWaiverBalance:
              type: number
              description: Account balance above which monthly maintenance fee is waived
              x-fdx-csdf-account-categories: [REG_E]
            monthlyFeeWaiverBalanceType:
              type: string
              description: Basis for assessing whether balance amount triggers maintenance fee waiver
                (average daily balance, average end-of-day balance, minimum end-of day balance)
              x-fdx-csdf-account-categories: [REG_E]
            interestRateTiers:
              type: array
              description: The single APY for the account statement period or the possible APYs earned for different
                minimum balance amounts (in the current cycle). Sorted from lowest `minimumBalance` to highest
              x-fdx-csdf-account-categories: [REG_E]
              items:
                $ref: '#/components/schemas/InterestRateTier'
              minItems: 1

    DepositTransaction:
      title: Deposit Transaction entity
