openapi: 3.1.0
info:
  version: '6.5.0'
  title: FDX V6.5.0 Core API
  description: Financial Data Exchange V6.5.0 Core API
  contact:
    name: Financial Data Exchange
    url: 'https://financialdataexchange.org/'
    email: fdxsupport@financialdataexchange.org
  license:
    name: FDX API License Agreement (11-13-2019)
    url: 'https://financialdataexchange.org/common/Uploaded%20files/Policies/FDX%20API%20License%20Agreement-(11-13-2019).pdf'
  x-fdx-csdf-account-categories: [ANY]
servers:
  - url: 'https://api.fi.com/fdx/v6'
    description: Financial Data Exchange V6 Core API
tags:
  - name: Account Information
    description: Search and view customer accounts
  - name: Account Statements
    description: Search and retrieve account statements
  - name: Account Transactions
    description: Search and view account transactions
  - name: Money Movement
    description: View account money movement details
  - name: Personal Information
    description: Search and view customer or customers
  - name: Reward Program Categories
    description: View categories of reward programs
  - name: Reward Program Information
    description: Search and view customer reward programs
  - name: Terms And Conditions
    description: View account terms and conditions
paths:
  ############################################################
  #
  # Core paths
  #
  ############################################################

  /accounts:
    parameters:
      - $ref: './fdxapi.components.yaml#/components/parameters/FapiInteractionIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiActorTypeHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiClientPublicKeyHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataProviderIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataRecipientIdHeader'
    x-fdx-csdf-account-categories: [ANY]
    get:
      operationId: searchForAccounts
      tags:
        - Account Information
      summary: Search for accounts
      description: >-
        Return information for all of the customer's consented accounts or just
        those accounts identified in the `accountIds` request parameter.
        Use `ResultTypeQuery` parameter value of `lightweight` to retrieve minimal
        descriptive information and the `accountId` for each account.
        The `accountId` can then be used in the `getAccount` operation's path
        `/accounts/{accountId}` to retrieve full details about each account
      x-fdx-csdf-account-categories: [ANY]
      parameters:
        - name: accountIds
          in: query
          description: Comma separated list of account ids
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: startTime
          in: query
          description: Start time for use in retrieval of transactions.
            Deprecated in v6.5, transactions fields were deprecated by RFCs 0309 and 0367
          schema:
            type: array
            items:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          deprecated: true
        - name: endTime
          in: query
          description: End time for use in retrieval of transactions.
            Deprecated in v6.5, transactions fields were deprecated by RFCs 0309 and 0367
          schema:
            type: array
            items:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          deprecated: true
        - name: startDate
          in: query
          description: Start date for use in retrieval of transactions.
            Deprecated in v6.5, transactions fields were deprecated by RFCs 0309 and 0367
          schema:
            $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          deprecated: true
        - name: endDate
          in: query
          description: End date for use in retrieval of transactions.
            Deprecated in v6.5, transactions fields were deprecated by RFCs 0309 and 0367
          schema:
            $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          deprecated: true
        - $ref: './fdxapi.components.yaml#/components/parameters/ResultTypeQuery'
        - $ref: './fdxapi.components.yaml#/components/parameters/OffsetQuery'
        - $ref: './fdxapi.components.yaml#/components/parameters/PageKeyQuery'
        - $ref: './fdxapi.components.yaml#/components/parameters/LimitQuery'
      responses:
        '200':
          description: >-
            Array of accounts (AnnuityAccount, BuyNowPayLaterAccount, CommercialAccount,
            DepositAccount, DigitalWallet, InsuranceAccount, InvestmentAccount,
            LineOfCreditAccount or LoanAccount)
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accounts'
              examples:
                Search for accounts success response:
                  value:
                    page:
                      nextOffset: '2'
                      total: 3
                    links:
                      next:
                        href: '/accounts?offSet=2&limit=10'
                    accounts:
                      - accountCategory: DEPOSIT_ACCOUNT
                        accountId: '10001'
                        nickname: My Checking Acc XXXX3223
                        status: OPEN
                        balanceAsOf: '2017-11-05T13:15:30.751Z'
                        currentBalance: 13300.35
                        openingDayBalance: 500
                      - accountCategory: DEPOSIT_ACCOUNT
                        accountId: '10002'
                        nickname: My Checking Acc XXXX4443
                        status: OPEN
                        balanceAsOf: '2017-11-05T13:15:30.751Z'
                        currentBalance: 332.22
                        openingDayBalance: 100.0
                      - accountCategory: LOAN_ACCOUNT
                        accountId: '20001'
                        nickname: My Mortgage Acc XXXX9979
                        status: OPEN
                        balanceAsOf: '2017-11-05T13:15:30.751Z'
                        principalBalance: 133000.35
                        loanTerm: 30
                        nextPaymentDate: '2017-12-01'
                        nextPaymentAmount: 2333.32
        '206':
          description: >-
            Partial success array of accounts (AnnuityAccount, BuyNowPayLaterAccount,
            CommercialAccount, DepositAccount, DigitalWallet, InsuranceAccount,
            InvestmentAccount, LineOfCreditAccount or LoanAccount)
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Accounts'
        '400':
          description: Start or end date value is not in the ISO 8601 format
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: './fdxapi.components.yaml#/components/schemas/Error'
              examples:
                Invalid start or end date:
                  value:
                    code: '702'
                    message: Invalid start or end date
                    debugMessage: Provider custom developer-level error details for troubleshooting
                Invalid date range:
                  value:
                    code: '703'
                    message: Invalid date range
                    debugMessage: Provider custom developer-level error details for troubleshooting
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: './fdxapi.components.yaml#/components/responses/500'
        '501':
          $ref: './fdxapi.components.yaml#/components/responses/501'
        '503':
          $ref: './fdxapi.components.yaml#/components/responses/503'

  /accounts/{accountId}:
    parameters:
      - $ref: './fdxapi.components.yaml#/components/parameters/FapiInteractionIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiActorTypeHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiClientPublicKeyHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataProviderIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataRecipientIdHeader'
    x-fdx-csdf-account-categories: [ANY]
    get:
      operationId: getAccount
      tags:
        - Account Information
      summary: Retrieve account details
      description: >-
        Retrieve full details about the account identified by `{accountId}` parameter
      x-fdx-csdf-account-categories: [ANY]
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          description: >-
            This can be one of AnnuityAccount, BuyNowPayLaterAccount,
            CommercialAccount, DepositAccount, DigitalWallet, InsuranceAccount,
            InvestmentAccount, LineOfCreditAccount or LoanAccount
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountWithDetails'
              examples:
                Loan Account With Details:
                  value:
                    accountCategory: LOAN_ACCOUNT
                    accountId: '12345678'
                    accountType: LOAN
                    accountNumberDisplay: XXXXX4567
                    status: OPEN
                    description: 30 Year Mortgage
                    nickname: My Home Mortgage
                    currency:
                      currencyCode: USD
                    chargedInterest:
                      rate: 4
                      type: FIXED
                    loanTerm: 0
                    totalNumberOfPayments: 0
        '404':
          description: Account with id not found
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: './fdxapi.components.yaml#/components/schemas/Error'
              examples:
                Account not found:
                  value:
                    code: '701'
                    message: Account not found
                    debugMessage: Provider custom developer-level error details for troubleshooting
        '500':
          $ref: './fdxapi.components.yaml#/components/responses/500'
        '501':
          $ref: './fdxapi.components.yaml#/components/responses/501'
        '503':
          $ref: './fdxapi.components.yaml#/components/responses/503'

  /accounts/{accountId}/asset-transfer-networks:
    parameters:
      - $ref: './fdxapi.components.yaml#/components/parameters/FapiInteractionIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiActorTypeHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiClientPublicKeyHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataProviderIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataRecipientIdHeader'
    get:
      operationId: getAccountAssetTransferNetworks
      tags:
        - Money Movement
      description: ...
      summary: Get asset transfer details for this account
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          description: Information required to facilitate asset transfer from this account
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetTransferNetworkList'
              examples:
                ACATS:
                  value:
                    assetTransferNetworks:
                      - identifier: '121000358'
                        identifierType: "ACCOUNT_NUMBER"
                        institutionName: US Investments
                        institutionId: '1234567890'
                        type: 'US_ACATS'
                        jointAccount: true

  /accounts/{accountId}/contact:
    parameters:
      - $ref: './fdxapi.components.yaml#/components/parameters/FapiInteractionIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiActorTypeHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiClientPublicKeyHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataProviderIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataRecipientIdHeader'
    x-fdx-csdf-account-categories: [ANY]
    get:
      operationId: getAccountContact
      tags:
        - Personal Information
      description: Get contact information on the account
      summary: Get an account's contact information
      x-fdx-csdf-account-categories: [ANY]
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          description: >-
            Details used to verify an account
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountContact'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: './fdxapi.components.yaml#/components/responses/500'
        '501':
          $ref: './fdxapi.components.yaml#/components/responses/501'
        '503':
          $ref: './fdxapi.components.yaml#/components/responses/503'

  /accounts/{accountId}/payment-networks:
    parameters:
      - $ref: '#/components/parameters/AccountIdPath'
      - $ref: './fdxapi.components.yaml#/components/parameters/FapiInteractionIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiActorTypeHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiClientPublicKeyHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataProviderIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataRecipientIdHeader'
    x-fdx-csdf-account-categories: [REG_E]
    get:
      operationId: getAccountPaymentNetworks
      tags:
        - Money Movement
      description: Get payment networks supported by the account
      summary: Get payment networks supported by the account
      x-fdx-csdf-account-categories: [REG_E]
      parameters:
        - $ref: './fdxapi.components.yaml#/components/parameters/OffsetQuery'
        - name: pageKey
          in: query
          description: Pagination for `/accounts/{accountId}/payment-network` is deprecated in v6.5
          deprecated: true
          schema:
            type: integer
        - name: limit
          in: query
          description: Pagination for `/accounts/{accountId}/payment-network` is deprecated in v6.5
          deprecated: true
          schema:
            type: integer
        - name: bankIdType
          in: query
          description: Type of Bank ID or the Routing Number, if an international Bank Identifier Code (`BIC`)
            is needed for international payments. If omitted response should default to the appropriate domestic
            bank IDs of either `US_ABA_NUMBER` or `CA_ROUTING_NUMBER` depending upon institution
          required: false
          schema:
            $ref: '#/components/schemas/BankIdType'
        - name: paymentNetworkTypes
          in: query
          description: Comma separated list of payment network types being requested, if the account
            supports them, such as `US_ACH`, `US_CHECK`, `US_RTP`, `US_RTP_RFP`, etc.
          style: form
          explode: false
          required: false  # to be made required: true with FDX major release v7.0
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PaymentNetworkType'
        - name: identifierTypes
          in: query
          description: Comma separated list of `identifier` types being requested, such as
            if a specific type is required for the requested `paymentNetworkTypes`.
            One or both of `ACCOUNT_NUMBER`, `TOKENIZED_ACCOUNT_NUMBER`
          style: form
          explode: false
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PaymentNetworkIdentifierType'
      responses:
        '200':
          description: Information required to execute a payment transaction against this account.
            If response contains `ACCOUNT_NUMBER` identifiers which are not masked this is sensitive data
            which should only be exchanged if encrypted. For detailed information on implementing encryption
            see the FDX CSDF API Security Model document's "Part 2 FDX Message Encryption" in the Security
            folder of the latest FDX Release download
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPaymentNetworks'
                description: >-
                  Represents what the encrypted JSON payload would be in a response containing sensitive data
                  (`ACCOUNT_NUMBER` identifiers).
                  Data Provider could return this as an unencrypted response when it contains only non-sensitive
                  data (such as `TOKENIZED_ACCOUNT_NUMBER` identifiers)
              examples:
                Real Account Number with Transfer Limits:
                  value:
                    paymentNetworks:
                      - paymentNetworkId: "pymt-netwk-428a30"
                        bankId: "121000358"
                        bankIdType: US_ABA_NUMBER
                        identifier: "1234567890"
                        identifierType: "ACCOUNT_NUMBER"
                        type: "US_ACH"
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
                        transferLimits:
                          out:
                            day:
                              resetsOn: "2023-08-09T00:00:00.000Z"
                              transferMaxAmount: 10000.0
                              transferRemainingAmount: 8356.0
                              maxOccurrence: 6
                              remainingOccurrence: 5
                            month:
                              resetsOn: "2023-09-01T00:00:00.000Z"
                              transferMaxAmount: 50000.0
                              transferRemainingAmount: 35200.0
                            transaction:
                              transferMaxAmount: 5000.0
                              transferRemainingAmount: 4990.0
                Tokenized Account Number on Multiple Networks with Reused ID:
                  value:
                    paymentNetworks:
                      - paymentNetworkId: "pymt-netwk-428a31"
                        bankId: "121000358"
                        bankIdType: US_ABA_NUMBER
                        identifier: "987654321"
                        identifierType: "TOKENIZED_ACCOUNT_NUMBER"
                        type: "US_ACH"
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
                      - paymentNetworkId: "pymt-netwk-428a31"
                        bankId: "121000358"
                        bankIdType: US_ABA_NUMBER
                        identifier: "0987654321"
                        identifierType: TOKENIZED_ACCOUNT_NUMBER
                        type: US_RTP
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
                Mixed Payment Networks with Separate IDs:
                  value:
                    paymentNetworks:
                      - paymentNetworkId: "pymt-netwk-0003"
                        bankId: "121000358"
                        bankIdType: US_ABA_NUMBER
                        identifier: "1234567890"
                        identifierType: "ACCOUNT_NUMBER"
                        type: "US_ACH"
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
                      - paymentNetworkId: "pymt-netwk-0004"
                        bankId: "026009593"
                        bankIdType: US_ABA_NUMBER
                        identifier: "1234567890"
                        identifierType: "ACCOUNT_NUMBER"
                        type: "US_FEDWIRE"
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
        '404':
          $ref: '#/components/responses/404'
        '422':
          description: Unprocessable Entity
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: './fdxapi.components.yaml#/components/schemas/Error'
              examples:
                Invalid request parameter combination:
                  value:
                    code: '422'
                    message: Unprocessable due to requested bankIdType or identifierType(s) not compatible with
                      one or more of requested paymentNetworkType(s)
                    debugMessage: Data provider's custom developer-level error details for troubleshooting
        '500':
          $ref: './fdxapi.components.yaml#/components/responses/500'
        '501':
          $ref: './fdxapi.components.yaml#/components/responses/501'
        '503':
          $ref: './fdxapi.components.yaml#/components/responses/503'

  /accounts/{accountId}/payment-networks/{paymentNetworkId}:
    parameters:
      - $ref: '#/components/parameters/AccountIdPath'
      - $ref: '#/components/parameters/PaymentNetworkIdPath'
      - $ref: './fdxapi.components.yaml#/components/parameters/FapiInteractionIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiActorTypeHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiClientPublicKeyHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataProviderIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataRecipientIdHeader'
    x-fdx-csdf-account-categories: [REG_E]
    get:
      operationId: getAccountPaymentNetwork
      tags:
        - Money Movement
      summary: Get the payment networks on the account for `paymentNetworkId`
      description: Get the payment network(s) on this account for the `bankId` and
        account `identifier` pair identified by the paymentNetworkId
      x-fdx-csdf-account-categories: [REG_E]
      responses:
        '200':
          description: The details and status of the payment network(s) for this `paymentNetworkId`
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                description: >-
                  Represents what the encrypted JSON payload would be in a response containing sensitive data
                  (`ACCOUNT_NUMBER` identifiers).
                  Data Provider could return this as an unencrypted response when it contains only non-sensitive
                  data (such as `TOKENIZED_ACCOUNT_NUMBER` identifiers)
                $ref: '#/components/schemas/AccountPaymentNetworks'
              examples:
                Real Account Number with Transfer Limits:
                  value:
                    paymentNetworks:
                      - paymentNetworkId: "pymt-netwk-428a30"
                        bankId: "121000358"
                        bankIdType: US_ABA_NUMBER
                        identifier: "1234567890"
                        identifierType: ACCOUNT_NUMBER
                        type: US_ACH
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
                        transferLimits:
                          out:
                            day:
                              resetsOn: "2023-08-09T00:00:00.000Z"
                              transferMaxAmount: 10000.0
                              transferRemainingAmount: 8356.0
                              maxOccurrence: 6
                              remainingOccurrence: 5
                            month:
                              resetsOn: "2023-09-01T00:00:00.000Z"
                              transferMaxAmount: 50000.0
                              transferRemainingAmount: 35200.0
                            transaction:
                              transferMaxAmount: 5000.0
                              transferRemainingAmount: 4990.0
                Tokenized Account Number on Multiple Networks with same paymentNetworkId:
                  value:
                    paymentNetworks:
                      - paymentNetworkId: "pymt-netwk-428a31"
                        bankId: "121000358"
                        bankIdType: US_ABA_NUMBER
                        identifier: "0987654321"
                        identifierType: TOKENIZED_ACCOUNT_NUMBER
                        type: US_ACH
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
                      - paymentNetworkId: "pymt-netwk-428a31"
                        bankId: "121000358"
                        bankIdType: US_ABA_NUMBER
                        identifier: "0987654321"
                        identifierType: TOKENIZED_ACCOUNT_NUMBER
                        type: US_RTP
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
                Only a single bankId and account identifier for a paymentNetworkId:
                  value:
                    paymentNetworks:
                      - paymentNetworkId: "pymt-netwk-0003"
                        bankId: "121000358"
                        bankIdType: US_ABA_NUMBER
                        identifier: "11900000432"
                        identifierType: TOKENIZED_ACCOUNT_NUMBER
                        type: US_ACH
                        status: ACTIVE
                        transferIn: true
                        transferOut: true
        '404':
          $ref: './fdxapi.components.yaml#/components/responses/404'
        '500':
          $ref: './fdxapi.components.yaml#/components/responses/500'
        '501':
          $ref: './fdxapi.components.yaml#/components/responses/501'
        '503':
          $ref: './fdxapi.components.yaml#/components/responses/503'

  /accounts/{accountId}/payment-networks/{paymentNetworkId}/revocation:
    parameters:
      - $ref: '#/components/parameters/AccountIdPath'
      - $ref: '#/components/parameters/PaymentNetworkIdPath'
      - $ref: './fdxapi.components.yaml#/components/parameters/FapiInteractionIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiActorTypeHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiClientPublicKeyHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataProviderIdHeader'
      - $ref: './fdxapi.components.yaml#/components/parameters/FdxApiDataRecipientIdHeader'
    put:
      summary: Revoke a payment network identifier
      description: Revoke the payment network pair of `bankId` and account `identifier`
        identified by the paymentNetworkId across all its multiple payment network types.
        For example, a `TOKENIZED_ACCOUNT_NUMBER` thought to be compromised will be
        revoked across both US_ACH and US_RTP (assuming it was issued across both)
      operationId: revokePaymentNetworkId
      tags:
        - Money Movement
      requestBody:
        description: Reason and initiator of payment network identifier revocation request
        required: true
        content:
          application/json:
            schema:
              $ref: './fdxapi.components.yaml#/components/schemas/RevocationRequest'
            examples:
              Standard Request:
                value:
                  reason: BUSINESS_RULE
                  initiator: DATA_ACCESS_PLATFORM
      responses:
        '204':
          description: No Content
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
        '400':
          $ref: './fdxapi.components.yaml#/components/responses/400'
        '401':
          $ref: './fdxapi.components.yaml#/components/responses/401'
        '403':
          $ref: './fdxapi.components.yaml#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '409':
          $ref: './fdxapi.components.yaml#/components/responses/409'
    get:
      summary: Retrieve revocation records of a payment network identifier
      description: Retrieve revocation records of a payment network identifier pair of
        `bankId` and account `identifier`, possibly used across multiple payment network types
      operationId: getPaymentNetworkLifecycleEvents
      tags:
        - Money Movement
      responses:
        '200':
          description: Ok
          headers:
            x-fapi-interaction-id:
              $ref: './fdxapi.components.yaml#/components/headers/x-fapi-interaction-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentNetworkLifecycleEvents'
        '401':
          $ref: './fdxapi.components.yaml#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

