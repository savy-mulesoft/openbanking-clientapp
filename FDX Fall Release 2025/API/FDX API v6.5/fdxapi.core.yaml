              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Maturity date
            interestPaidYearToDate:
              type: number
              description: Interest paid year to date
            currentSchool:
              type: string
              description: Current school the student loan is connected to
            loanProviderName:
              type: string
              description: Name of the institution providing the loan
            transactions:
              type: array
              description: Transactions on the loan account.
                Deprecated in release V6.3.1 and will be removed in next major release.
                Transactions are returned in the `searchForAccountTransactions` operation response.
              deprecated: true
              items:
                $ref: '#/components/schemas/LoanTransaction'

    LoanTransaction:
      title: Loan Transaction entity
      description: A transaction on a loan account
      type: object
      allOf:
        - $ref: '#/components/schemas/Transaction'
        - type: object
          properties:
            # Constrain accountCategory for tooling compatibility
            accountCategory:
              const: LOAN_ACCOUNT
              description: The entity type of the account of this transaction, in this case LOAN_ACCOUNT
            transactionType:
              $ref: '#/components/schemas/LoanTransactionType'
              description: PAYMENT, FEE, ADJUSTMENT, INTEREST
            paymentDetails:
              $ref: './fdxapi.components.yaml#/components/schemas/PaymentDetails'
              description: Breakdown of payment details

    MutualFundSecurity:
      title: Mutual Fund Security entity
      description: A mutual fund
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: MUTUAL_FUND_SECURITY
              description: The entity type of this security, in this case MUTUAL_FUND_SECURITY
            mutualFundType:
              $ref: '#/components/schemas/MutualFundType'
              description: Mutual fund type. One of OPENEND, CLOSEEND, OTHER
            unitsStreet:
              type: number
              description: Units in the FI's street name, positive quantity
            unitsUser:
              type: number
              description: Units in user's name directly, positive  quantity
            reinvestDividends:
              type: boolean
              description: Reinvest dividends
            reinvestCapitalGains:
              type: boolean
              description: Reinvest capital gains
            yield:
              type: number
              description: Current yield reported as portion of the fund's assets
            yieldAsOfDate:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: As-of date for yield value

    OpenOrder:
      title: Open Order entity
      description: An open investment transaction order
      type: object
      properties:
        orderId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long-term persistent identity of the order. Id for this order transaction
        securityId:
          type: string
          description: Unique identifier of security
        securityIdType:
          $ref: '#/components/schemas/SecurityIdType'
          description: CINS, CMC, CME, CUSIP, ISIN, ITSA, NASDAQ, SEDOL, SICC, VALOR, WKN
        symbol:
          type: string
          description: Market symbol
        description:
          type: string
          description: Description of order
        units:
          type: number
          description: Number of units (shares or bonds etc.)
        orderType:
          $ref: '#/components/schemas/OrderType'
          description: >-
            Type of order. One of BUY, SELL, BUYTOCOVER, BUYTOOPEN, SELLTOCOVER,
            SELLTOOPEN,  SELLSHORT, SELLCLOSE
        orderDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Order date
        unitPrice:
          type: number
          description: Unit price
        unitType:
          $ref: '#/components/schemas/UnitType'
          description: Type of unit. One of SHARES, CURRENCY
        orderDuration:
          $ref: '#/components/schemas/OrderDuration'
          description: This order is good for DAY, GOODTILLCANCEL, IMMEDIATE
        subAccount:
          $ref: '#/components/schemas/SubAccountType'
          description: CASH, MARGIN, SHORT, OTHER
        limitPrice:
          type: number
          description: Limit price
        stopPrice:
          type: number
          description: Stop price
        inv401kSource:
          $ref: '#/components/schemas/Inv401kSourceType'
          description: >-
            For 401(k) accounts, source of money for this order. PRETAX,
            AFTERTAX, MATCH, PROFITSHARING, ROLLOVER, OTHERVEST, OTHERNONVEST.
            Default if not present is OTHERNONVEST

    OptionSecurity:
      title: Option Security entity
      description: An option
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: OPTION_SECURITY
              description: The entity type of this security, in this case OPTION_SECURITY
            secured:
              $ref: '#/components/schemas/Secured'
              description: How the option is secured. One of NAKED, COVERED
            optionType:
              $ref: '#/components/schemas/OptionType'
              description: Option type. One of PUT, CALL
            strikePrice:
              type: number
              description: Strike price / Unit price
            expireDate:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Expiration date of option
            sharesPerContract:
              type: number
              description: Shares per contract

    OtherSecurity:
      title: Other Security entity
      description: Any other kind of security
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: OTHER_SECURITY
              description: The entity type of this security, in this case OTHER_SECURITY
            typeDescription:
              type: string
              description: Description of other security

    PaymentNetworkLifecycleEvent:
      title: Payment Network Lifecycle Event entity
      description: Details of a lifecycle change on a payment network pair of `bankId` and account
        `identifier` identified by the `paymentNetworkId` on a single account and payment network type
      type: object
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/LifecycleEvent'
        - type: object
          properties:
            status:
              description: >-
                The status after the event or change requested, overrides the
                `status: ConsentGrantStatus` in `LifecycleEvent`, here with
                values one of `ACTIVE`, `SUSPENDED` or `REVOKED`
              $ref: '#/components/schemas/AccountPaymentNetworkStatus'
            paymentNetworkType:
              description: The payment network type for this event on this `paymentNetworkId`
              $ref: '#/components/schemas/PaymentNetworkType'

    PaymentNetworkLifecycleEvents:
      title: Payment Network Lifecycle Events entity
      description: List of lifecycle change events on a payment network pair of `bankId` and
        account `identifier` identified by the `paymentNetworkId`
      type: object
      properties:
        events:
          description: The list of payment network lifecycle events such as revocation requests
          type: array
          items:
            $ref: '#/components/schemas/PaymentNetworkLifecycleEvent'

    PaymentNetworkOccurrenceTransferLimits:
      title: Occurrence based limits for a Payment Network
      description: This provides the occurrence-based limits applied to the account within the payment network
      type: object
      properties:
        transferMaxAmount:
          type: number
          description: Maximum limit of funds that can be transferred to/from the account using the timeframe limits
        transferRemainingAmount:
          type: number
          description: Remaining value of the maximum limit of funds that can be transferred to/from the account using the timeframe limits

    PaymentNetworkTimeframeTransferLimits:
      title: Timeframe based limits for a Payment Network
      description: This provides the time-based limits applied to the account within the payment network
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      properties:
        resetsOn:
          $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
          description: Date/time at which this timeframe will reset next
          x-fdx-csdf-account-categories: [REG_E]
        transferMaxAmount:
          type: number
          description: Maximum limit of funds that can be transferred to/from the account in this timeframe
          x-fdx-csdf-account-categories: [REG_E]
        transferRemainingAmount:
          type: number
          description: Remaining value of the maximum limit of funds that can be transferred to/from the account in this timeframe
          x-fdx-csdf-account-categories: [REG_E]
        maxOccurrence:
          type: integer
          description: Maximum number of transfers that can be made in this direction for this timeframe
          x-fdx-csdf-account-categories: [REG_E]
        remainingOccurrence:
          type: integer
          description: Remaining number of transfers that can be made in this direction for this timeframe
          x-fdx-csdf-account-categories: [REG_E]

    PaymentNetworkTransferLimits:
      title: Time and occurrence based transfer limits
      description: The transfer amount limits for each timeframe or occurrence
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      properties:
        day:
          $ref: '#/components/schemas/PaymentNetworkTimeframeTransferLimits'
          description: The transfer limits for the current day
          x-fdx-csdf-account-categories: [REG_E]
        week:
          $ref: '#/components/schemas/PaymentNetworkTimeframeTransferLimits'
          description: The transfer limits for the current week
          x-fdx-csdf-account-categories: [REG_E]
        month:
          $ref: '#/components/schemas/PaymentNetworkTimeframeTransferLimits'
          description: The transfer limits for the current month
          x-fdx-csdf-account-categories: [REG_E]
        year:
          $ref: '#/components/schemas/PaymentNetworkTimeframeTransferLimits'
          description: The transfer limits for the current year
          x-fdx-csdf-account-categories: [REG_E]
        transaction:
          $ref: '#/components/schemas/PaymentNetworkOccurrenceTransferLimits'
          description: The transfer limits taking effect from all the timeframe limits
          x-fdx-csdf-account-categories: [REG_E]

    PensionSource:
      title: Pension Source entity
      description: The source of pension funds
      type: object
      properties:
        displayName:
          type: string
          description: Name of the source
        amount:
          type: number
          description: Benefit Amount
        paymentOption:
          type: string
          description: Form of payment
        asOfDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Date benefit was calculated
        frequency:
          $ref: '#/components/schemas/PaymentFrequency'
          description: ANNUALLY, BIWEEKLY, DAILY, MONTHLY, SEMIANNUALLY, SEMIMONTHLY, WEEKLY
        startDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Assumed retirement date. As of date amount is payable

    Portion:
      title: Portion entity
      description: An asset allocation with class and percentage
      type: object
      properties:
        assetClass:
          $ref: '#/components/schemas/AssetClass'
          description: The asset class for this allocation
        percent:
          type: number
          description: The percentage of this allocation

    Promotion:
      title: Promotion entity
      description: The promotions originally defined in Ts & Cs or currently active for a promotion on
        a loan or line of credit account
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      properties:
        type:
          type: string
          description: Defined or active Promotion Type
          x-fdx-csdf-account-categories: [REG_Z]
        balance:
          type: number
          description: Defined or active Promotion balance
          x-fdx-csdf-account-categories: [REG_Z]
        promotionApr:
          type: number
          description: Current annual percentage rate (APR) for defined or active Promotion
          x-fdx-csdf-account-categories: [REG_Z]
        balanceSubjectToInterestRate:
          type: number
          description: Defined or active Promotion balance subject to Interest Rate
          x-fdx-csdf-account-categories: [REG_Z]
        daysInBillingCycle:
          type: integer
          description: Defined or active Promotion - Days in Billing Cycle
          x-fdx-csdf-account-categories: [REG_Z]
        interestCharge:
          type: number
          description: Defined or active Promotion - Interest Charge
          x-fdx-csdf-account-categories: [REG_Z]
        startDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Defined or active Promotion - Start Date
          x-fdx-csdf-account-categories: [REG_Z]
        endDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Defined or active Promotion - End Date
          x-fdx-csdf-account-categories: [REG_Z]
        transactionDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Defined or active Promotion -  Transaction Date
          x-fdx-csdf-account-categories: [REG_Z]
        specialTermsEndDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Defined or active Promotion - Special Terms End Date
          x-fdx-csdf-account-categories: [REG_Z]
        balanceSubjectToDeferredInterest:
          type: number
          description: Defined or active Promotion - Balance Subject to Deferred Interest
          x-fdx-csdf-account-categories: [REG_Z]
        deferredInterestCharge:
          type: number
          description: Defined or active Promotion - Deferred Interest Charge
          x-fdx-csdf-account-categories: [REG_Z]
        specialTermsBalance:
          type: number
          description: Defined or active Promotion - Special Terms Balance
          x-fdx-csdf-account-categories: [REG_Z]

    Remittance:
      title: Remittance
      description: Remittance details for a transaction
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        paymentId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: An ID for the payment from the external payment rail.
            For SWIFT wires this will be Unique End-to-End Transaction Reference (UETR)
          x-fdx-csdf-account-categories: [ANY]
        type:
          $ref: '#/components/schemas/PaymentNetworkType'
          description: The payment rail of the transaction, such as `SWIFT_WIRE`
          x-fdx-csdf-account-categories: [ANY]
        valueDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Date that the payment is executed
          x-fdx-csdf-account-categories: [ANY]
        paymentStatus:
          $ref: '#/components/schemas/RemittanceStatus'
          description: Status of the transaction from the payment rail, including one of
            `IN_PROGRESS`, `FAILED`, `CANCELLED`, `REJECTED` or `COMPLETED`
          x-fdx-csdf-account-categories: [ANY]
        exchangeRate:
          type: number
          description: Exchange rate used to convert the instructed amount,
            if the source currency is different from the received currency
          x-fdx-csdf-account-categories: [ANY]
        sourceCurrency:
          $ref: './fdxapi.components.yaml#/components/schemas/Iso4217CurrencyCode'
          description: The ISO 4217 code of the currency of the source account
          x-fdx-csdf-account-categories: [ANY]
        debtor:
          $ref: '#/components/schemas/RemittanceParty'
          description: Identification of the debtor party to the transaction for the funds source,
            can include `accountNumber` which is sensitive data and should be encrypted
          x-fdx-csdf-account-categories: [ANY]
        creditor:
          $ref: '#/components/schemas/RemittanceParty'
          description: Identification of the creditor party to the transaction for the funds received,
            can include `accountNumber` which is sensitive data and should be encrypted
          x-fdx-csdf-account-categories: [ANY]
        fiAttributes:
          type: array
          description: Array of additional remittance attributes. This can include SWIFT tags
            such as '20', '70', '71A', '72' and etc, or similar custom fields from other rails
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'

    RemittanceParty:
      title: Remittance Party
      description: Identification of a party to the transaction
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        name:
          type: string
          description: Company or individual name of the remittance debtor or creditor
          x-fdx-csdf-account-categories: [ANY]
        accountNumber:
          type: string
          description: >-
            Full account number for the source or recipient account of the remittance debit or credit.
            If not masked this is sensitive data which should be encrypted in the response
          x-fdx-csdf-account-categories: [ANY]

    RewardBalance:
      title: Reward Balance entity
      description: Reward program balance
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        name:
          type: string
          description: Name used to denominate the balance
          x-fdx-csdf-account-categories: [ANY]
        type:
          $ref: '#/components/schemas/RewardType'
          description: The type of the reward balance - CASHBACK, MILES, POINTS
          x-fdx-csdf-account-categories: [ANY]
        balance:
          type: number
          description: Total units available for redemption at time of download
          x-fdx-csdf-account-categories: [ANY]
        accruedYtd:
          type: number
          description: Total units accrued in the current program year at time of download
          minimum: 0
          x-fdx-csdf-account-categories: [ANY]
        redeemedYtd:
          type: number
          description: Total units redeemed in the current program year at time of download
          minimum: 0
          x-fdx-csdf-account-categories: [ANY]
        qualifying:
          type: boolean
          description: Balance used for qualifying purposes
          default: false
          x-fdx-csdf-account-categories: [ANY]
        fiAttributes:
          type: array
          description: Array of FI-specific attributes
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'

    RewardCategories:
      title: Reward Categories entity
      description: An optionally paginated array of reward categories
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/PaginatedArray'
        - type: object
          properties:
            rewardCategories:
              description: Array of reward categories
              type: array
              x-fdx-csdf-account-categories: [ANY]
              items:
                $ref: '#/components/schemas/RewardCategory'
              uniqueItems: true

    RewardCategory:
      title: Reward Category entity
      description: Reward category used to calculate rewards on a transaction
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        rewardProgramId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long term persistent identity of the reward program
          x-fdx-csdf-account-categories: [ANY]
        categoryName:
          type: string
          description: Reward category name
          x-fdx-csdf-account-categories: [ANY]
        categoryId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long term persistent identity of the reward category
          x-fdx-csdf-account-categories: [ANY]
        multiplier:
          type: number
          description: Factor used to calculate rewards accrued
          minimum: 0
          x-fdx-csdf-account-categories: [ANY]
        description:
          type: string
          description: Description of the reward category
          x-fdx-csdf-account-categories: [ANY]
        fiAttributes:
          type: array
          description: Array of FI-specific attributes
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'

    RewardMembership:
      title: Reward Program Membership entity
      description: Details of a single membership in a reward programs
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        accountIds:
          type: array
          description: Array of accountIds associated to the reward program.
            Deprecated in release v6.5 in favor of single `accountId` for these balances
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          uniqueItems: true
          deprecated: true
        accountId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: A single accountId associated to the reward program
          x-fdx-csdf-account-categories: [ANY]
        customerId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long-term persistent identity of the associated Customer
          x-fdx-csdf-account-categories: [ANY]
        memberId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long term persistent identity of the program member
          x-fdx-csdf-account-categories: [ANY]
        memberNumber:
          type: string
          description: Reward program membership number
          x-fdx-csdf-account-categories: [ANY]
        memberTier:
          type: string
          description: If the reward program is tiered, member's current tier
          x-fdx-csdf-account-categories: [ANY]
        businessOrConsumer:
          $ref: './fdxapi.components.yaml#/components/schemas/BusinessOrConsumer'
          description: BUSINESS or CONSUMER membership
          x-fdx-csdf-account-categories: [ANY]
        balances:
          type: array
          description: Array of balances
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: '#/components/schemas/RewardBalance'
          minItems: 1

    RewardProgram:
      title: Reward Program entity
      description: Reward program detail
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        rewardProgramId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long term persistent identity of the reward program
          x-fdx-csdf-account-categories: [ANY]
        programName:
          type: string
          description: Name of reward program
          x-fdx-csdf-account-categories: [ANY]
        programUrl:
          type: string
          description: URL of reward program
          x-fdx-csdf-account-categories: [ANY]
        memberships:
          description: Array of reward memberships
          type: array
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: '#/components/schemas/RewardMembership'
        fiAttributes:
          type: array
          description: Array of FI-specific attributes
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'

    RewardPrograms:
      title: Reward Programs entity
      description: An optionally paginated array of reward programs
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/PaginatedArray'
        - type: object
          properties:
            rewardPrograms:
              description: Array of reward programs
              type: array
              x-fdx-csdf-account-categories: [ANY]
              items:
                $ref: '#/components/schemas/RewardProgram'

    RewardsTermsAndConditions:
      title: Rewards Terms And Conditions entity
      description: The terms and conditions data elements for the account rewards
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        rewardProgramId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long term persistent identity of the reward program
          x-fdx-csdf-account-categories: [ANY]
        uris:
          type: array
          description: Static public-facing URIs which return the reward program's
            terms and conditions as PDF files or web content
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: '#/components/schemas/TermsAndConditionsUri'
        baseEarning:
          type: string
          description: Rewards earned for base category transactions
          example: Earn 1.5 Base Points for every $1 spent on Net Purchase
          x-fdx-csdf-account-categories: [ANY]
        bonusEarning:
          type: string
          description: Rewards earned during bonus period
          example: Earn additional 1.5 Bonus Points for every $1 spent on Net Purchase
          x-fdx-csdf-account-categories: [ANY]
        rewardType:
          $ref: '#/components/schemas/RewardType'
          description: The type of the reward balance - CASHBACK, MILES, POINTS
          x-fdx-csdf-account-categories: [ANY]
        minimumRedemption:
          type: string
          description: What minimum balance is required for initial redemption options
          example: Redemption options start at 2,500 Points
          x-fdx-csdf-account-categories: [ANY]
        pointsExpire:
          type: boolean
          description: Whether earned rewards can expire
          x-fdx-csdf-account-categories: [ANY]
        expirationRules:
          type: string
          description: What are the rules for rewards expiration
          example: Points do not expire
          x-fdx-csdf-account-categories: [ANY]
        forfeiture:
          type: string
          description: What are the rules for rewards forfeiture
          example: Points are subject to forfeiture due to closing of the card account
          x-fdx-csdf-account-categories: [ANY]
        pointsCalculation:
          type: string
          description: Description of Points Calculation
          x-fdx-csdf-account-categories: [ANY]
        basePointsCalculation:
          type: string
          description: Description of Base Points calculation
          x-fdx-csdf-account-categories: [ANY]
        travelCreditRewards:
          type: string
          description: How to redeem Travel Credit Rewards
          x-fdx-csdf-account-categories: [ANY]
        cashRewards:
          type: string
          description: How to redeem Cash Rewards
          x-fdx-csdf-account-categories: [ANY]
        giftCardRewards:
          type: string
          description: How to redeem Gift Card Rewards
          x-fdx-csdf-account-categories: [ANY]
        ineligible:
          type: string
          description: What are the rules for transactions ineligible to earn points
          example: Transaction and account fees are not eligible for rewards
          x-fdx-csdf-account-categories: [ANY]
        fiAttributes:
          type: array
          description: Array of Financial institution-specific attributes
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'

    RewardTransactions:
      title: Reward Transactions entity
      description: Optionally paginated array of account transaction summaries with rewards
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/PaginatedArray'
        - type: object
          properties:
            rewardTransactions:
              description: >-
                An array of transaction summaries on which the account has earned rewards or adjustments
              type: array
              x-fdx-csdf-account-categories: [ANY]
              items:
                $ref: '#/components/schemas/TransactionSummary'

    ScheduledPayment:
      title: Scheduled Payment entity
      description: A payment scheduled on the account
      type: object
      x-fdx-csdf-account-categories: [REG_Z]
      properties:
        amount:
          type: number
          description: Total payment due or next payment due. Monthly payment due for loans
          x-fdx-csdf-account-categories: [REG_Z]
        date:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: The date that the payment is due
          x-fdx-csdf-account-categories: [REG_Z]
        type:
          $ref: '#/components/schemas/ScheduledPaymentType'
          description: Type of payment (`AUTOPAY`, `ONE_TIME`, `REPEATING`)
          x-fdx-csdf-account-categories: [REG_Z]
        payToPrincipal:
          type: boolean
          description: Whether payment is applied to principal or not
          x-fdx-csdf-account-categories: [REG_Z]

    Security:
      title: Security entity
      description: A base Security entity which defines the type of this security
      type: object
      required:
        - securityCategory
      discriminator:
        propertyName: securityCategory
      properties:
        securityCategory:
          $ref: '#/components/schemas/SecurityCategory'
          description: The main type of this Security
        fiAttributes:
          type: array
          description: Array of FI-specific attributes
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'

    SecurityId:
      title: Security ID entity
      description: Unique identifier for a security
      type: object
      properties:
        id:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Security identifier
        idType:
          $ref: '#/components/schemas/SecurityIdType'
          description: CINS, CMC, CME, CUSIP, ISIN, ITSA, NASDAQ, SEDOL, SICC, VALOR, WKN

    Statement:
      title: Statement entity
      description: An account statement
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        accountId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Corresponds to accountId in Account entity
          x-fdx-csdf-account-categories: [ANY]
        statementId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long-term persistent identity of the statement
          x-fdx-csdf-account-categories: [ANY]
        statementDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Date of the statement
          x-fdx-csdf-account-categories: [ANY]
        description:
          type: string
          description: Description of statement
          x-fdx-csdf-account-categories: [ANY]
        links:
          $ref: './fdxapi.components.yaml#/components/schemas/HateoasLinks'
          description: The links to retrieve this account statement, or to invoke other APIs
          x-fdx-csdf-account-categories: [ANY]
        status:
          $ref: '#/components/schemas/DocumentStatus'
          description: Availability status of statement
          x-fdx-csdf-account-categories: [ANY]

    Statements:
      title: An array of statements
      description: A paginated array of account statements
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/PaginatedArray'
        - type: object
          properties:
            statements:
              type: array
              description: An array of Statement, each with its HATEOAS link to retrieve the account statement
              x-fdx-csdf-account-categories: [ANY]
              items:
                $ref: '#/components/schemas/Statement'

    StockSecurity:
      title: Stock Security entity
      description: A stock security
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: STOCK_SECURITY
              description: The entity type of this security, in this case STOCK_SECURITY
            unitsStreet:
              type: number
              description: The units in the FI's street name as a positive quantity
            unitsUser:
              type: number
              description: The units in user's name directly as a positive quantity
            reinvestDividends:
              type: boolean
              description: Selection to reinvest dividends
            stockType:
              $ref: '#/components/schemas/StockType'
              description: COMMON, PREFERRED, CONVERTIBLE, OTHER
            yield:
              type: number
              description: The current yield
            yieldAsOfDate:
              $ref: './fdxapi.components.yaml#/components/schemas/DateString'
              description: Yield as-of date

    SweepSecurity:
      title: Sweep Security entity
      description: A sweep security
      type: object
      allOf:
        - $ref: '#/components/schemas/Security'
        - type: object
          properties:
            # Constrain securityCategory for tooling compatibility
            securityCategory:
              const: SWEEP_SECURITY
              description: The entity type of this security, in this case SWEEP_SECURITY
            currentBalance:
              type: number
              description: Balance of funds in account
            availableBalance:
              type: number
              description: Balance of funds available for use
            balanceAsOf:
              $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
              description: As-of date of balances
            checks:
              type: boolean
              description: Whether or not checks can be written on the account

    TaxLot:
      title: Tax Lot entity
      description: Block of securities receiving the same tax treatment
      type: object
      properties:
        originalPurchaseDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Lot acquired date
        quantity:
          type: number
          description: Lot quantity
        purchasedPrice:
          type: number
          description: Original purchase price
        costBasis:
          type: number
          description: >-
            Total amount of money spent acquiring this lot including any fees or
            commission expenses incurred
        currentValue:
          type: number
          description: Lot market value
        positionType:
          $ref: '#/components/schemas/PositionType'
          description: LONG, SHORT

    TermsAndConditions:
      title: Terms and Conditions entity
      description: Response entity for terms and conditions data elements
      type: object
      x-fdx-csdf-account-categories: [ANY]
      required:
        - accountCategory
      discriminator:
        propertyName: accountCategory
        mapping:
          # in AccountCategoryDeposit:
          ANNUITY_ACCOUNT: '#/components/schemas/BaseDepositAccountTermsAndConditions'
          COMMERCIAL_ACCOUNT: '#/components/schemas/BaseDepositAccountTermsAndConditions'
          DEPOSIT_ACCOUNT: '#/components/schemas/BaseDepositAccountTermsAndConditions'
          DIGITAL_WALLET: '#/components/schemas/BaseDepositAccountTermsAndConditions'
          INSURANCE_ACCOUNT: '#/components/schemas/BaseDepositAccountTermsAndConditions'
          INVESTMENT_ACCOUNT: '#/components/schemas/BaseDepositAccountTermsAndConditions'
          # in AccountCategoryLineOfCredit:
          BNPL_ACCOUNT: '#/components/schemas/BaseLineOfCreditAccountTermsAndConditions'
          LOAN_ACCOUNT: '#/components/schemas/BaseLineOfCreditAccountTermsAndConditions'
          LOC_ACCOUNT: '#/components/schemas/BaseLineOfCreditAccountTermsAndConditions'
      oneOf:
        - $ref: '#/components/schemas/BaseDepositAccountTermsAndConditions'
        - $ref: '#/components/schemas/BaseLineOfCreditAccountTermsAndConditions'

    TermsAndConditionsCommon:
      title: Terms and Conditions Common elements
      description: Base response entity for terms and conditions data elements shared among account types
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        effectiveDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Date that the document or content became effective
          x-fdx-csdf-account-categories: [ANY]
        arbitrationProvision:
          type: boolean
          description: A terms and conditions clause that requires the parties
            to resolve their disputes through an arbitration process.
            If `true`, the terms and conditions have an Arbitration Provision
          x-fdx-csdf-account-categories: [ANY]
        cardReplacementFee:
          type: number
          description: Fee for replacement of debit or credit card (Rush order?).
            The value is zero if not charged on this account
          default: 0
          x-fdx-csdf-account-categories: [ANY]
        paperStatementsFee:
          type: number
          description: Fee for paper statements.
            The value is zero if not charged on this account
          default: 0
          x-fdx-csdf-account-categories: [ANY]
        domesticAtmFee:
          type: number
          description: Fee for ATM withdrawal or advance in account-holder's own country and currency.
            The value is zero if not charged on this account
          default: 0
          x-fdx-csdf-account-categories: [ANY]
        foreignAtmForeignCurrencyAdvanceFee:
          type: number
          description: Fee for foreign transaction ATM withdrawal or advance in foreign currency.
            The value is zero if not charged on this account
          default: 0
          x-fdx-csdf-account-categories: [ANY]
        foreignAtmUsDollarAdvanceFee:
          type: number
          description: Fee for foreign transaction ATM withdrawal or advance in US Dollars.
            The value is zero if not charged on this account
          default: 0
          x-fdx-csdf-account-categories: [ANY]
        foreignPurchaseForeignCurrencyFee:
          type: number
          description: Fee for foreign transaction purchase in foreign currency.
            The value is zero if not charged on this account
          default: 0
          x-fdx-csdf-account-categories: [ANY]
        transactionLimits:
          type: array
          description: The various maximum amounts on different types of account transactions
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: '#/components/schemas/TransactionLimit'
          minItems: 1
        promotions:
          type: array
          description: The promotions originally defined in Terms and Conditions or currently active on the account
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: '#/components/schemas/Promotion'
        fiAttributes:
          type: array
          description: Array of Financial institution-specific attributes
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'

    TermsAndConditionsUri:
      title: Terms and Conditions URI entity
      description: A static public-facing URI which returns account terms and conditions
        via PDF files or web content rather than the JSON data elements defined in parallel
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        uri:
          type: string
          format: uri
          description: Static public-facing URI which can return terms and conditions
            PDF files or HTML content
          x-fdx-csdf-account-categories: [ANY]
        title:
          type: string
          description: Name or description of the content that will be returned from the uri
          x-fdx-csdf-account-categories: [ANY]
        type:
          $ref: '#/components/schemas/UriContentType'
          description: What type of document or content lives at the uri, one of PDF or HTML
          x-fdx-csdf-account-categories: [ANY]
        lang:
          type: string
          default: en
          description: The ISO 639-1 two-character language code of the content if it is not in English,
            as listed at [ISO 639.2](https://www.loc.gov/standards/iso639-2/php/code_list.php).
            Requestor indicates desired non-English language(s) in Accept-Language request header
          x-fdx-csdf-account-categories: [ANY]
        effectiveDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Date that the document or content became effective
          x-fdx-csdf-account-categories: [ANY]
        expireDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Date that the document or content will expire
          x-fdx-csdf-account-categories: [ANY]

    Transaction:
      title: Transaction
      description: Financial transaction details not specific to an account category
      type: object
      x-fdx-csdf-account-categories: [ANY]
      required:
        - accountCategory
      discriminator:
        propertyName: accountCategory
      allOf:
        - $ref: '#/components/schemas/TransactionSummary'
        - type: object
          properties:
            accountCategory:
              $ref: '#/components/schemas/AccountCategory'
              description: The entity type of the account of this Transaction
              x-fdx-csdf-account-categories: [ANY]
            referenceTransactionId:
              $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
              description: >-
                For reverse postings, the identity of the transaction being
                reversed. For the correction transaction, the identity of the
                reversing post. For credit card posting transactions, the identity
                of the authorization transaction
              x-fdx-csdf-account-categories: [ANY]
            cardNumberDisplay:
              type: string
              description: The payment card number (e.g. debit, credit or digital), suitably masked,
                used to originate the transaction. May differ from primary account number as a
                secondary or employee card or a one-time use number. This is an optional field
                and won't be returned for certain types of transactions such as cash or check deposits
              x-fdx-csdf-account-categories: [ANY]
            memo:
              $ref: './fdxapi.components.yaml#/components/schemas/String255'
              description: Secondary transaction description
              x-fdx-csdf-account-categories: [ANY]
            category:
              type: string
              description: 'Transaction category, preferably MCC or SIC.'
              x-fdx-csdf-account-categories: [ANY]
            subCategory:
              type: string
              description: Transaction category detail specifying the standard of the transaction category.
                For example, "MCC"
              x-fdx-csdf-account-categories: [ANY]
            reference:
              type: string
              description: A tracking reference identifier
              x-fdx-csdf-account-categories: [ANY]
            remittance:
              $ref: '#/components/schemas/Remittance'
              description: Remittance details for the transaction
              x-fdx-csdf-account-categories: [ANY]
            foreignAmount:
              type: number
              description: The amount of money in the foreign currency
              x-fdx-csdf-account-categories: [ANY]
            foreignCurrency:
              $ref: './fdxapi.components.yaml#/components/schemas/Iso4217CurrencyCode'
              description: The ISO 4217 code of the foreign currency
              x-fdx-csdf-account-categories: [ANY]
            imageIds:
              type: array
              description: >-
                Array of Image Identifiers (unique to this transaction) used to retrieve Images of
                check or transaction receipt
              x-fdx-csdf-account-categories: [ANY]
              items:
                type: string
            lineItem:
              type: array
              description: Breakdown of the transaction details
              x-fdx-csdf-account-categories: [ANY]
              items:
                $ref: '#/components/schemas/LineItem'

    TransactionLimit:
      title: Transaction Limit
      description: The various size limits on account transaction amounts
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      properties:
        maximumAmount:
          type: number
          description: The maximum amount which is permitted for a single transaction of this type
          x-fdx-csdf-account-categories: [REG_E]
        type:
          $ref: '#/components/schemas/DepositTransactionType'
          description: The type of transaction restricted by this limit, such as ATMWITHDRAWAL,
            BILLPAYMENT, CASHIERSCHECK, PERSONTOPERSON
          x-fdx-csdf-account-categories: [REG_E]

    TransactionPayee:
      title: Transaction Payee entity
      description: Primary demographic information for payee on a transaction;
        name, location, contact phone
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        merchantName:
          $ref: './fdxapi.components.yaml#/components/schemas/BusinessName'
          description: Name when payee is a merchant,
            typically a business from which goods or services are rendered
          x-fdx-csdf-account-categories: [ANY]
        merchantId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Merchant identifier (MID) for card processing
          x-fdx-csdf-account-categories: [ANY]
        individualName:
          $ref: './fdxapi.components.yaml#/components/schemas/IndividualName'
          description: Name when payee is an individual
          x-fdx-csdf-account-categories: [ANY]
        address:
          $ref: './fdxapi.components.yaml#/components/schemas/DeliveryAddress'
          description: Address of the payee who received the payment
          x-fdx-csdf-account-categories: [ANY]
        phone:
          $ref: './fdxapi.components.yaml#/components/schemas/TelephoneNumber'
          description: Phone number of the payee who received the payment
          x-fdx-csdf-account-categories: [ANY]

    TransactionReward:
      title: Transaction Reward entity
      description: Rewards earned on a transaction
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        categoryId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: >-
            Long term persistent identity of the reward category.
            This ID is mapped to a category definition returned by calling
            the getRewardProgramCategories operation
          x-fdx-csdf-account-categories: [ANY]
        accrued:
          type: number
          description: Reward units accrued on this transaction
          x-fdx-csdf-account-categories: [ANY]
        adjusted:
          type: number
          description: Reward units adjusted on this transaction
          x-fdx-csdf-account-categories: [ANY]
        type:
          $ref: '#/components/schemas/RewardType'
          description: The type of the reward balance - CASHBACK, MILES, POINTS
          x-fdx-csdf-account-categories: [ANY]

    Transactions:
      title: Transactions entity
      description: Optionally paginated array of transactions
      type: object
      x-fdx-csdf-account-categories: [ANY]
      allOf:
        - $ref: './fdxapi.components.yaml#/components/schemas/PaginatedArray'
        - type: object
          properties:
            transactions:
              description: >-
                An array of transactions with entity type dependent on the account type
                (Buy Now Pay Later, Commercial, Deposit, Digital Wallet, Insurance,
                Investment, Line of Credit or Loan)
              type: array
              x-fdx-csdf-account-categories: [ANY]
              items:
                discriminator:
                  propertyName: accountCategory
                  mapping:
                    BNPL_ACCOUNT: '#/components/schemas/BuyNowPayLaterTransaction'
                    COMMERCIAL_ACCOUNT: '#/components/schemas/CommercialTransaction'
                    DEPOSIT_ACCOUNT: '#/components/schemas/DepositTransaction'
                    DIGITAL_WALLET: '#/components/schemas/DigitalWalletTransaction'
                    INSURANCE_ACCOUNT: '#/components/schemas/InsuranceTransaction'
                    INVESTMENT_ACCOUNT: '#/components/schemas/InvestmentTransaction'
                    LOAN_ACCOUNT: '#/components/schemas/LoanTransaction'
                    LOC_ACCOUNT: '#/components/schemas/LineOfCreditTransaction'
                oneOf:
                  - $ref: '#/components/schemas/BuyNowPayLaterTransaction'
                  - $ref: '#/components/schemas/CommercialTransaction'
                  - $ref: '#/components/schemas/DepositTransaction'
                  - $ref: '#/components/schemas/DigitalWalletTransaction'
                  - $ref: '#/components/schemas/InsuranceTransaction'
                  - $ref: '#/components/schemas/InvestmentTransaction'
                  - $ref: '#/components/schemas/LineOfCreditTransaction'
                  - $ref: '#/components/schemas/LoanTransaction'

    TransactionSummary:
      title: Transaction Summary
      description: Summary data elements for a financial transaction
      type: object
      x-fdx-csdf-account-categories: [ANY]
      properties:
        accountId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Corresponds to AccountId in Account
          x-fdx-csdf-account-categories: [ANY]
        transactionId:
          $ref: './fdxapi.components.yaml#/components/schemas/Identifier'
          description: Long term persistent identity of the transaction (unique to account)
          x-fdx-csdf-account-categories: [ANY]
        postedTimestamp:
          $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
          description: >-
            The date and time that the transaction was posted to the account. If
            not provided then TransactionTimestamp can be used as
            PostedTimeStamp
          x-fdx-csdf-account-categories: [ANY]
        transactionTimestamp:
          $ref: './fdxapi.components.yaml#/components/schemas/Timestamp'
          description: >-
            The date and time that the transaction was added to the server
            backend systems
          x-fdx-csdf-account-categories: [ANY]
        description:
          type: string
          description: >-
            The description of the transaction, such as information about a merchant's
            name or place of business in a manner that is user friendly and accessible to the customer.
            Detailed information on a payee, such as address, can be sent in `transactionPayee`
          x-fdx-csdf-account-categories: [ANY]
        transactionPayee:
          $ref: '#/components/schemas/TransactionPayee'
          description: The merchant or individual payee who was involved in the transaction
          x-fdx-csdf-account-categories: [ANY]
        debitCreditMemo:
          $ref: '#/components/schemas/DebitCreditMemo'
          description: DEBIT, CREDIT, MEMO
          x-fdx-csdf-account-categories: [ANY]
        status:
          $ref: '#/components/schemas/TransactionStatus'
          description: PENDING, MEMO, POSTED, AUTHORIZATION
          x-fdx-csdf-account-categories: [ANY]
        amount:
          type: number
          description: The amount of money in the account currency
          x-fdx-csdf-account-categories: [ANY]
        reward:
          allOf:
            - $ref: '#/components/schemas/TransactionReward'
          description: Rewards earned with this transaction.
            If data provider does not have rewards data available alongside full Transaction details,
            instead of including in full `/transactions` response this can be returned as part of
            `/reward-transactions` endpoint.
            Deprecated in v6.5 to be replaced by array property `rewards` in next major version v7.0
          x-fdx-csdf-account-categories: [ANY]
          deprecated: true
        rewards:
          type: array
          description: Array of rewards earned or adjusted with this transaction.
            If data provider does not have rewards data available alongside full Transaction details,
            instead of including in full `/transactions` response this can be returned as part of
            `/reward-transactions` endpoint
          x-fdx-csdf-account-categories: [ANY]
          items:
            $ref: '#/components/schemas/TransactionReward'
        fiAttributes:
          type: array
          description: Array of FI-specific attributes
          items:
            $ref: './fdxapi.components.yaml#/components/schemas/FiAttribute'
        links:
          $ref: './fdxapi.components.yaml#/components/schemas/HateoasLinks'
          description: >-
            Links (unique to this transaction) used to retrieve full transaction details
            or images of checks or transaction receipts
          x-fdx-csdf-technical: true

    TransferLimits:
      title: Incoming and outgoing transfer limits
      description: The amount limits for incoming and outgoing transfers
      type: object
      x-fdx-csdf-account-categories: [REG_E]
      properties:
        out:
          description: Limits for outgoing transfers from the account
          $ref: '#/components/schemas/PaymentNetworkTransferLimits'
          x-fdx-csdf-account-categories: [REG_E]
        in:
          description: Limits for incoming transfers to the account
          $ref: '#/components/schemas/PaymentNetworkTransferLimits'
          x-fdx-csdf-account-categories: [REG_E]

    Vesting:
      title: Vesting entity
      description: Represents the vesting of ownership of an investment account
      type: object
      properties:
        vestingDate:
          $ref: './fdxapi.components.yaml#/components/schemas/DateString'
          description: Vesting date
        symbol:
          type: string
          description: Security symbol
        strikePrice:
          type: number
          description: Strike price
        vestingPercentage:
          type: number
          description: Vesting percentage
        otherVestAmount:
          type: number
          description: Other vested amount
        otherVestPercentage:
          type: number
          description: Other vested percentage
        vestedBalance:
          type: number
          description: Vested balance
        unVestedBalance:
          type: number
          description: Unvested balance
        vestedQuantity:
          type: number
          description: Vested quantity
        unVestedQuantity:
          type: number
          description: Unvested quantity

    ############################################################
    #
    # Core data types
    #
    ############################################################

    AccountBillPayStatus:
      title: Account Bill Pay Status
      description: >-
        Indicates bill pay capabilities for an account.
          * `ACTIVE`: Can be used for bill payment
          * `AVAILABLE`: Account can be requested for bill payment
          * `NOT_AVAILABLE`: Account cannot participate in bill payment
          * `PENDING`: Account requested for bill payment, but not available yet
      type: string
      x-fdx-csdf-account-categories: [REG_E]
      enum:
        - ACTIVE
        - AVAILABLE
        - NOT_AVAILABLE
        - PENDING

    AccountCategory:
      title: Account Category type
      description: The category of account
      type: string
      x-fdx-csdf-account-categories: [ANY]
      enum:
        - ANNUITY_ACCOUNT
        - BNPL_ACCOUNT
        - COMMERCIAL_ACCOUNT
        - DEPOSIT_ACCOUNT
        - DIGITAL_WALLET
        - INSURANCE_ACCOUNT
        - INVESTMENT_ACCOUNT
        - LOAN_ACCOUNT
        - LOC_ACCOUNT

    AccountCategoryDeposit:
      title: Account Category - Deposit type
      description: The categories of deposit account types
      type: string
      x-fdx-csdf-account-categories: [REG_E]
      enum:
        - ANNUITY_ACCOUNT
        - COMMERCIAL_ACCOUNT
        - DEPOSIT_ACCOUNT
        - DIGITAL_WALLET
        - INSURANCE_ACCOUNT
        - INVESTMENT_ACCOUNT

    AccountCategoryLineOfCredit:
      title: Account Category - Line Of Credit type
      description: The categories of Line of Credit account types
      type: string
      x-fdx-csdf-account-categories: [REG_Z]
      enum:
        - BNPL_ACCOUNT
        - LOAN_ACCOUNT
        - LOC_ACCOUNT

    AccountStatus:
      title: Account Status
      description: The status of an account
      type: string
      x-fdx-csdf-account-categories: [ANY]
      enum:
        - CLOSED
        - DELINQUENT
        - NEGATIVECURRENTBALANCE
        - OPEN
        - PAID
        - PENDINGCLOSE
        - PENDINGOPEN
        - RESTRICTED

    AdvanceType:
      title: Balance Transfer and Cash Advance Type
      description: >-
        The categories of balance transfers and cash advances. One of:
          * `BALANCE_TRANSFER`: Balance transfers
          * `CASH_ADVANCE`: Other cash advance
          * `CHECK_CASH_ADVANCE`: Cash advance in the form of a check
          * `DIRECT_DEPOSIT_CASH_ADVANCE`: Cash advance in the form of direct deposit to an account
          * `OTC_CASH_ADVANCE`: Over the counter (OTC) cash advance at a bank or financial institution branch
      type: string
      x-fdx-csdf-account-categories: [REG_Z]
      enum:
        - BALANCE_TRANSFER
        - CASH_ADVANCE
        - CHECK_CASH_ADVANCE
        - DIRECT_DEPOSIT_CASH_ADVANCE
        - OTC_CASH_ADVANCE

    AssetClass:
      title: Asset Class
      description: The class of an investment asset
      type: string
      enum:
        - DOMESTICBOND
        - INTLBOND
        - INTLSTOCK
        - LARGESTOCK
        - MONEYMARKET
